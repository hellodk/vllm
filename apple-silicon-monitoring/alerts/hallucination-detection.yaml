# Prometheus/Mimir Alert Rules for LLM Hallucination Detection
# These rules monitor output quality and potential hallucination signals
#
# IMPORTANT — SDK instrumentation required
# All metrics in this file (llm_output_entropy_bucket, llm_repetition_score,
# llm_confidence_mean, llm_confidence_std, llm_perplexity_bucket,
# llm_refusal_rate) are emitted ONLY by the manually-wrapped Python SDK or
# the mock server.  They are NOT produced by native vLLM, SGLang, or MLX
# engines.  These alerts will be silent when running against deployed engines
# unless the SDK wrapper layer is active or an equivalent instrumentation
# adapter is deployed.

groups:
  - name: hallucination-detection
    interval: 30s
    rules:
      #
      # Entropy-Based Alerts
      #
      
      - alert: HighOutputEntropy
        expr: |
          histogram_quantile(0.95, 
            rate(llm_output_entropy_bucket[10m])
          ) > 4.0
        for: 10m
        labels:
          severity: warning
          team: ml-platform
          category: hallucination
        annotations:
          summary: "High output entropy for {{ $labels.model }} - potential hallucination risk"
          description: |
            P95 output entropy is {{ $value | printf "%.2f" }}, which exceeds the safe threshold of 4.0.
            
            High entropy indicates the model is uncertain about its outputs.
            This may signal:
            - Out-of-distribution queries
            - Knowledge gaps
            - Potential hallucinations
            
            Actions:
            - Review recent query patterns
            - Check if model needs fine-tuning updates
            - Consider adding guardrails for high-entropy outputs
          dashboard: "https://grafana.internal/d/llm-quality?var-model={{ $labels.model }}"

      - alert: EntropySpike
        expr: |
          histogram_quantile(0.95, rate(llm_output_entropy_bucket[5m])) 
          > (histogram_quantile(0.95, rate(llm_output_entropy_bucket[1h] offset 5m)) * 1.5)
        for: 15m
        labels:
          severity: warning
          team: ml-platform
          category: hallucination
        annotations:
          summary: "Entropy spike detected for {{ $labels.model }}"
          description: |
            P95 entropy has increased 50% above recent baseline.
            This sudden change may indicate:
            - New types of queries
            - Model drift
            - Data quality issues

      #
      # Repetition Alerts
      #
      
      - alert: HighRepetitionScore
        expr: llm_repetition_score > 0.3
        for: 5m
        labels:
          severity: warning
          team: ml-platform
          category: hallucination
        annotations:
          summary: "High n-gram repetition detected for {{ $labels.model }}"
          description: |
            Repetition score is {{ $value | printf "%.2f" }} (threshold: 0.3).
            
            High repetition often indicates:
            - Model stuck in loops
            - Degenerate outputs
            - Potential hallucination patterns
            
            Actions:
            - Check temperature and sampling settings
            - Review repetition penalty configuration
            - Inspect recent outputs for patterns

      - alert: SevereRepetition
        expr: llm_repetition_score > 0.5
        for: 2m
        labels:
          severity: critical
          team: ml-platform
          category: hallucination
        annotations:
          summary: "Severe repetition in {{ $labels.model }} outputs"
          description: |
            Repetition score is {{ $value | printf "%.2f" }}.
            The model appears to be generating highly repetitive (possibly looping) output.
            This is a critical quality issue.

      #
      # Confidence Alerts
      #
      
      - alert: LowConfidenceOutputs
        expr: llm_confidence_mean < 0.5
        for: 10m
        labels:
          severity: warning
          team: ml-platform
          category: hallucination
        annotations:
          summary: "Low confidence outputs from {{ $labels.model }}"
          description: |
            Mean token confidence is {{ $value | printf "%.2f" }}.
            The model is consistently uncertain about its predictions.
            
            This may indicate:
            - Queries outside training distribution
            - Model capacity issues
            - Need for model updates

      - alert: ConfidenceDrift
        expr: |
          abs(llm_confidence_mean - avg_over_time(llm_confidence_mean[1h])) 
          / stddev_over_time(llm_confidence_mean[1h]) > 3
        for: 15m
        labels:
          severity: warning
          team: ml-platform
          category: hallucination
        annotations:
          summary: "Confidence score drifting from baseline for {{ $labels.model }}"
          description: |
            Confidence has moved more than 3 standard deviations from the hourly average.
            This statistical anomaly may indicate:
            - Change in query distribution
            - Model behavior change
            - Potential quality degradation

      - alert: HighConfidenceVariance
        expr: llm_confidence_std > 0.3
        for: 10m
        labels:
          severity: info
          team: ml-platform
          category: hallucination
        annotations:
          summary: "High confidence variance for {{ $labels.model }}"
          description: |
            Confidence standard deviation is {{ $value | printf "%.2f" }}.
            The model's confidence varies significantly across tokens.
            This may be normal for diverse queries but worth monitoring.

      #
      # Perplexity Alerts
      #
      
      - alert: HighPerplexity
        expr: |
          histogram_quantile(0.95, 
            rate(llm_perplexity_bucket[10m])
          ) > 50
        for: 10m
        labels:
          severity: warning
          team: ml-platform
          category: hallucination
        annotations:
          summary: "High perplexity for {{ $labels.model }}"
          description: |
            P95 perplexity is {{ $value | printf "%.1f" }}.
            This indicates the model is highly uncertain about its outputs.
            
            Normal perplexity ranges: 1-30
            Elevated perplexity: 30-50
            High perplexity: 50+

      #
      # Composite Risk Alerts
      #
      
      - alert: HallucinationRiskElevated
        expr: |
          (
            (histogram_quantile(0.95, rate(llm_output_entropy_bucket[10m])) / 5) * 0.3 +
            llm_repetition_score * 0.3 +
            (1 - llm_confidence_mean) * 0.2 +
            (histogram_quantile(0.95, rate(llm_perplexity_bucket[10m])) / 100) * 0.2
          ) > 0.5
        for: 15m
        labels:
          severity: warning
          team: ml-platform
          category: hallucination
        annotations:
          summary: "Elevated hallucination risk for {{ $labels.model }}"
          description: |
            Multiple hallucination signals are elevated.
            Composite risk score: {{ $value | printf "%.2f" }}
            
            Contributing factors:
            - Entropy signal
            - Repetition patterns
            - Low confidence
            - High perplexity
            
            Review output quality and consider implementing guardrails.

      - alert: HallucinationRiskCritical
        expr: |
          (
            (histogram_quantile(0.95, rate(llm_output_entropy_bucket[5m])) / 5) * 0.3 +
            llm_repetition_score * 0.3 +
            (1 - llm_confidence_mean) * 0.2 +
            (histogram_quantile(0.95, rate(llm_perplexity_bucket[5m])) / 100) * 0.2
          ) > 0.7
        for: 5m
        labels:
          severity: critical
          team: ml-platform
          category: hallucination
          pagerduty: trigger
        annotations:
          summary: "CRITICAL hallucination risk for {{ $labels.model }}"
          description: |
            Multiple hallucination signals are at critical levels.
            
            IMMEDIATE ACTIONS:
            1. Consider taking model offline
            2. Review recent outputs for quality
            3. Check for system issues affecting inference
            4. Investigate query patterns

      #
      # Refusal Rate Monitoring
      #
      
      - alert: HighRefusalRate
        expr: |
          avg_over_time(llm_refusal_rate[15m]) > 0.2
        for: 15m
        labels:
          severity: info
          team: ml-platform
          category: quality
        annotations:
          summary: "High refusal rate for {{ $labels.model }}"
          description: |
            {{ $value | humanizePercentage }} of responses are refusals.
            The model is declining to answer many queries.
            
            This may indicate:
            - Queries hitting safety guardrails
            - Out-of-scope requests
            - Overly cautious model behavior

      - alert: RefusalRateSpike
        expr: |
          llm_refusal_rate > 0.5
        for: 5m
        labels:
          severity: warning
          team: ml-platform
          category: quality
        annotations:
          summary: "Refusal rate spike for {{ $labels.model }}"
          description: |
            More than half of responses are refusals.
            This is unusual and may indicate an issue.

      #
      # Trend-Based Alerts
      #
      
      - alert: QualityDegradationTrend
        expr: |
          deriv(llm_confidence_mean[1h]) < -0.01
        for: 1h
        labels:
          severity: warning
          team: ml-platform
          category: quality
        annotations:
          summary: "Quality degradation trend for {{ $labels.model }}"
          description: |
            Confidence scores are trending downward over the past hour.
            Rate of change: {{ $value | printf "%.4f" }}/s
            
            This gradual degradation may indicate:
            - Model drift
            - Changing query patterns
            - System resource constraints
