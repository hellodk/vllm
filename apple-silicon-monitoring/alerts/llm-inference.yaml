# Prometheus/Mimir Alert Rules for LLM Inference Metrics
#
# These rules fire against the unified hydra:llm:* recording-rule layer defined in
# monitoring/prometheus/rules/hydra-llm-normalization.yml, which normalises
# vLLM (vllm:*), SGLang (sglang:*), and MLX engine metrics into a common
# namespace labelled by provider, model, and node_id.
#
# Previously these alerts targeted llm_* SDK metrics emitted only by the
# manually-wrapped Python SDK / mock server.  Those metrics are absent from
# deployed engines, so the old alerts never fired.  All operational alerts
# below are now bound to hydra:llm:* so they fire against real engines.
#
# SDK-only quality signals (health score) are isolated in the llm-quality
# group at the bottom of this file.

groups:
  - name: llm-inference
    interval: 15s
    rules:

      # -----------------------------------------------------------------------
      # Meta-alert: guard against metric-name regression
      # -----------------------------------------------------------------------

      - alert: LLMMetricsMissing
        expr: absent(hydra:llm:up{provider=~"vllm.*|sglang|mlx"})
        for: 10m
        labels:
          severity: critical
          team: ml-platform
          category: availability
          pagerduty: trigger
        annotations:
          summary: "hydra:llm:up absent — recording-rule pipeline may be broken"
          description: |
            No hydra:llm:up series with provider=~"vllm.*|sglang|mlx" has been
            seen for 10 minutes.  The normalization recording rules in
            hydra-llm-normalization.yml are either not loaded or the underlying
            engine exporters have stopped scraping.

            All LLM availability and performance alerts will be dark until this
            is resolved.

            Actions:
            1. Verify promtool/mimirtool can load hydra-llm-normalization.yml
            2. Check that vLLM / SGLang / MLX exporters are healthy
            3. Confirm the Prometheus rule evaluation interval has not stalled
          runbook_url: "https://wiki.company.internal/runbooks/llm-metrics-missing"

      # -----------------------------------------------------------------------
      # Model Availability
      # -----------------------------------------------------------------------

      - alert: LLMModelNotLoaded
        expr: hydra:llm:up == 0
        for: 5m
        labels:
          severity: critical
          team: ml-platform
          category: availability
        annotations:
          summary: "LLM engine down on {{ $labels.node_id }} ({{ $labels.provider }}/{{ $labels.model }})"
          node_id: "{{ $labels.node_id }}"
          description: |
            hydra:llm:up == 0 for provider={{ $labels.provider }},
            model={{ $labels.model }}, node={{ $labels.node_id }}.
            The inference engine is not responding; requests will fail.
          runbook_url: "https://wiki.company.internal/runbooks/model-not-loaded"

      - alert: LLMInferenceStalled
        expr: |
          hydra:llm:tokens_generated:rate1m == 0
          AND hydra:llm:up == 1
        for: 2m
        labels:
          severity: critical
          team: ml-platform
          category: inference
          pagerduty: trigger
        annotations:
          summary: "LLM inference stalled on {{ $labels.node_id }} ({{ $labels.provider }}/{{ $labels.model }})"
          node_id: "{{ $labels.node_id }}"
          description: |
            The engine is up (hydra:llm:up == 1) but no tokens have been
            generated for 2 minutes (hydra:llm:tokens_generated:rate1m == 0).
            The inference process may be deadlocked or the request pipeline broken.

            Actions:
            1. Check process logs for errors
            2. Verify GPU is responsive
            3. Consider restarting the inference process
          runbook_url: "https://wiki.company.internal/runbooks/inference-stalled"

      # -----------------------------------------------------------------------
      # Latency Alerts
      # -----------------------------------------------------------------------

      - alert: LLME2ELatencyHigh
        expr: hydra:llm:request_e2e_seconds:p95 > 30
        for: 5m
        labels:
          severity: warning
          team: ml-platform
          category: latency
        annotations:
          summary: "P95 end-to-end latency exceeds 30 s for {{ $labels.provider }}/{{ $labels.model }}"
          node_id: "{{ $labels.node_id }}"
          description: |
            P95 end-to-end request latency is {{ $value | printf "%.1f" }}s.
            Users will experience timeouts for long requests.

            Check:
            - GPU utilisation and memory
            - Batch queue depth (hydra:llm:requests_waiting)
            - Context lengths being processed
          dashboard: "https://grafana.internal/d/llm-latency?var-model={{ $labels.model }}"

      - alert: LLME2ELatencyElevated
        expr: hydra:llm:request_e2e_seconds:p95 > 10
        for: 10m
        labels:
          severity: warning
          team: ml-platform
          category: latency
        annotations:
          summary: "P95 end-to-end latency elevated above 10 s for {{ $labels.provider }}/{{ $labels.model }}"
          node_id: "{{ $labels.node_id }}"
          description: |
            P95 end-to-end latency is {{ $value | printf "%.1f" }}s, indicating
            sustained general slowness across all requests.

      - alert: LLMTTFTHigh
        expr: hydra:llm:ttft_seconds:p95 > 5
        for: 5m
        labels:
          severity: warning
          team: ml-platform
          category: latency
        annotations:
          summary: "P95 time-to-first-token high for {{ $labels.provider }}/{{ $labels.model }}"
          node_id: "{{ $labels.node_id }}"
          description: |
            P95 time-to-first-token (prefill/prompt phase) is
            {{ $value | printf "%.1f" }}s.
            This may indicate long context lengths or memory pressure on the
            prefill stage.

      # -----------------------------------------------------------------------
      # Throughput Alerts
      # -----------------------------------------------------------------------

      - alert: LLMThroughputDegraded
        expr: |
          hydra:llm:tokens_generated:rate1m < 10
          AND hydra:llm:up == 1
          AND hydra:llm:requests_running > 0
        for: 5m
        labels:
          severity: warning
          team: ml-platform
          category: throughput
        annotations:
          summary: "Token throughput below 10 tok/s for {{ $labels.provider }}/{{ $labels.model }}"
          node_id: "{{ $labels.node_id }}"
          description: |
            Current throughput is {{ $value | printf "%.1f" }} tokens/sec with
            active requests in flight.  Expected minimum is 10+ tok/s.

            Possible causes:
            - GPU thermal throttling
            - Memory pressure
            - Large batch queue
            - Long context lengths

      - alert: LLMThroughputDrop
        expr: |
          hydra:llm:tokens_generated:rate1m
          < (avg_over_time(hydra:llm:tokens_generated:rate1m[1h]) * 0.5)
          AND hydra:llm:tokens_generated:rate1m > 0
        for: 10m
        labels:
          severity: warning
          team: ml-platform
          category: throughput
        annotations:
          summary: "Throughput dropped >50% for {{ $labels.provider }}/{{ $labels.model }}"
          node_id: "{{ $labels.node_id }}"
          description: |
            Current throughput ({{ $value | printf "%.1f" }} tok/s) is less than
            half the hourly average.  Investigate for performance regression.

      # -----------------------------------------------------------------------
      # Queue and Capacity
      # -----------------------------------------------------------------------

      - alert: LLMQueueBacklog
        expr: hydra:llm:requests_waiting > 100
        for: 5m
        labels:
          severity: warning
          team: ml-platform
          category: capacity
        annotations:
          summary: "Request queue building up for {{ $labels.provider }}/{{ $labels.model }}"
          node_id: "{{ $labels.node_id }}"
          description: |
            {{ $value | printf "%.0f" }} requests are queued.
            Users will experience increased latency.

            Consider:
            - Scaling up inference capacity
            - Rate limiting requests
            - Load balancing to other nodes

      - alert: LLMQueueCritical
        expr: hydra:llm:requests_waiting > 500
        for: 2m
        labels:
          severity: critical
          team: ml-platform
          category: capacity
        annotations:
          summary: "Critical request queue depth for {{ $labels.provider }}/{{ $labels.model }}"
          node_id: "{{ $labels.node_id }}"
          description: |
            Queue depth is {{ $value | printf "%.0f" }}.
            System is severely overloaded.

      - alert: LLMKVCacheFull
        expr: hydra:llm:kv_cache_usage_ratio > 0.95
        for: 2m
        labels:
          severity: warning
          team: ml-platform
          category: memory
        annotations:
          summary: "KV cache nearly full for {{ $labels.provider }}/{{ $labels.model }}"
          node_id: "{{ $labels.node_id }}"
          description: |
            KV cache utilisation is {{ $value | humanizePercentage }}.
            New requests with long contexts may fail or be queued.

      # -----------------------------------------------------------------------
      # Error Alerts
      # -----------------------------------------------------------------------

      - alert: LLMErrorRateHigh
        expr: hydra:llm:errors:rate5m > 0.05
        for: 5m
        labels:
          severity: warning
          team: ml-platform
          category: errors
        annotations:
          summary: "Sustained error rate for {{ $labels.provider }}/{{ $labels.model }}"
          node_id: "{{ $labels.node_id }}"
          description: |
            Error rate is {{ $value | printf "%.3f" }}/s over 5 minutes.
            Check logs for error breakdown by type.

      - alert: LLMErrorSpike
        expr: hydra:llm:errors:rate5m > 0.5
        for: 2m
        labels:
          severity: critical
          team: ml-platform
          category: errors
          pagerduty: trigger
        annotations:
          summary: "Error spike for {{ $labels.provider }}/{{ $labels.model }}"
          node_id: "{{ $labels.node_id }}"
          description: |
            Errors occurring at {{ $value | printf "%.2f" }}/s over the last 5 minutes.
            Includes OOM, Metal crashes, and all other engine errors.

            For per-type breakdown query raw vllm:* / sglang:* / mlx:* series
            with error_type label (SDK instrumentation required for mlx).

  # ---------------------------------------------------------------------------
  # SDK-only quality alerts
  #
  # These alerts rely on llm_model_health_score, a composite metric emitted
  # only by the manually-wrapped Python SDK / mock server.  They are grouped
  # separately so they do NOT page as availability incidents.  They will be
  # dark when running against native vLLM/SGLang/MLX engines until those
  # engines expose an equivalent health-score metric via SDK instrumentation.
  # ---------------------------------------------------------------------------

  - name: llm-quality
    interval: 60s
    rules:

      - alert: LLMHealthScoreLow
        expr: llm_model_health_score < 70
        for: 10m
        labels:
          severity: warning
          team: ml-platform
          category: quality
        annotations:
          summary: "Model health score low for {{ $labels.model }} (SDK instrumentation required)"
          node_id: "{{ $labels.node_id }}"
          description: |
            Health score is {{ $value | printf "%.0f" }}/100.
            Multiple factors may be degrading model performance.
            Review individual metrics for root cause.

            NOTE: llm_model_health_score is only emitted by the Python SDK
            wrapper.  This alert is silent against native vLLM/SGLang/MLX
            engines without SDK instrumentation.

      - alert: LLMHealthScoreCritical
        expr: llm_model_health_score < 50
        for: 5m
        labels:
          severity: critical
          team: ml-platform
          category: quality
        annotations:
          summary: "Model health critically low for {{ $labels.model }} (SDK instrumentation required)"
          node_id: "{{ $labels.node_id }}"
          description: |
            Health score is {{ $value | printf "%.0f" }}/100.
            Model may not be functioning correctly.

            NOTE: llm_model_health_score is only emitted by the Python SDK
            wrapper.  This alert is silent against native vLLM/SGLang/MLX
            engines without SDK instrumentation.
