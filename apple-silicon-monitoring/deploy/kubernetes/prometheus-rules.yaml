apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: llm-inference-rules
  namespace: opik
  labels:
    release: monitoring
    app.kubernetes.io/name: prometheus-rule
    app.kubernetes.io/part-of: apple-silicon-llm-monitoring
spec:
  groups:
  - interval: 15s
    name: llm-inference
    rules:
    - alert: LLMModelNotLoaded
      annotations:
        description: 'Model {{ $labels.model }} is not loaded on {{ $labels.instance
          }}.

          Inference requests will fail until the model is loaded.

          '
        runbook_url: https://wiki.company.internal/runbooks/model-not-loaded
        summary: LLM model not loaded on {{ $labels.instance }}
      expr: llm_model_loaded == 0
      for: 5m
      labels:
        category: availability
        severity: critical
        team: ml-platform
    - alert: LLMInferenceStalled
      annotations:
        description: 'Model {{ $labels.model }} is loaded but no tokens have been processed
          in 2 minutes.

          The inference engine may be stuck or deadlocked.


          Actions:

          1. Check process logs for errors

          2. Verify GPU is responsive

          3. Consider restarting the inference process

          '
        runbook_url: https://wiki.company.internal/runbooks/inference-stalled
        summary: LLM inference appears stalled on {{ $labels.instance }}
      expr: "rate(llm_tokens_processed_total[2m]) == 0 \nAND llm_model_loaded == 1\n"
      for: 2m
      labels:
        category: inference
        pagerduty: trigger
        severity: critical
        team: ml-platform
    - alert: LLMHighLatencyP99
      annotations:
        dashboard: https://grafana.internal/d/llm-latency?var-model={{ $labels.model
          }}
        description: 'P99 total inference latency is {{ $value | printf "%.1f" }}s.

          Users may experience timeouts.


          Check:

          - GPU utilization and memory

          - Batch queue depth

          - Context lengths being processed

          '
        summary: P99 inference latency exceeds 30s for {{ $labels.model }}
      expr: "histogram_quantile(0.99, \n  rate(llm_inference_duration_seconds_bucket{phase=\"\
        total\"}[5m])\n) > 30\n"
      for: 5m
      labels:
        category: latency
        severity: warning
        team: ml-platform
    - alert: LLMHighLatencyP50
      annotations:
        description: 'P50 inference latency is {{ $value | printf "%.1f" }}s, indicating
          overall slow performance.

          '
        summary: Median inference latency exceeds 10s for {{ $labels.model }}
      expr: "histogram_quantile(0.50, \n  rate(llm_inference_duration_seconds_bucket{phase=\"\
        total\"}[5m])\n) > 10\n"
      for: 10m
      labels:
        category: latency
        severity: warning
        team: ml-platform
    - alert: LLMPromptLatencyHigh
      annotations:
        description: 'Prompt processing (prefill) P95 latency is {{ $value | printf
          "%.1f" }}s.

          This may indicate long contexts or memory pressure.

          '
        summary: P95 prompt processing latency high for {{ $labels.model }}
      expr: "histogram_quantile(0.95, \n  rate(llm_inference_duration_seconds_bucket{phase=\"\
        prompt\"}[5m])\n) > 5\n"
      for: 5m
      labels:
        category: latency
        severity: warning
        team: ml-platform
    - alert: LLMThroughputDegraded
      annotations:
        description: 'Current throughput is {{ $value | printf "%.1f" }} tokens/sec.

          Expected minimum for this model is 10+ tokens/sec.


          Possible causes:

          - GPU thermal throttling

          - Memory pressure

          - Large batch queue

          - Long context lengths

          '
        summary: Token throughput below 10 tokens/sec for {{ $labels.model }}
      expr: "llm_tokens_per_second < 10 \nAND llm_model_loaded == 1\nAND rate(llm_inference_requests_total[5m])\
        \ > 0\n"
      for: 5m
      labels:
        category: throughput
        severity: warning
        team: ml-platform
    - alert: LLMThroughputDrop
      annotations:
        description: 'Current throughput ({{ $value | printf "%.1f" }} tok/s) is less
          than half the hourly average.

          Investigate for performance regression.

          '
        summary: Throughput dropped 50% for {{ $labels.model }}
      expr: "llm_tokens_per_second \n< (avg_over_time(llm_tokens_per_second[1h]) * 0.5)\n\
        AND llm_tokens_per_second > 0\n"
      for: 10m
      labels:
        category: throughput
        severity: warning
        team: ml-platform
    - alert: LLMQueueBacklog
      annotations:
        description: '{{ $value | printf "%.0f" }} requests are queued.

          Users will experience increased latency.

          Consider:

          - Scaling up inference capacity

          - Rate limiting requests

          - Load balancing to other nodes

          '
        summary: Request queue building up for {{ $labels.model }}
      expr: llm_queue_depth > 100
      for: 5m
      labels:
        category: capacity
        severity: warning
        team: ml-platform
    - alert: LLMQueueCritical
      annotations:
        description: 'Queue depth is {{ $value | printf "%.0f" }}.

          System is severely overloaded.

          '
        summary: Critical request queue depth for {{ $labels.model }}
      expr: llm_queue_depth > 500
      for: 2m
      labels:
        category: capacity
        severity: critical
        team: ml-platform
    - alert: LLMKVCacheFull
      annotations:
        description: 'KV cache is at {{ $value | humanizePercentage }} utilization.

          New requests with long contexts may fail or be delayed.

          '
        summary: KV cache nearly full for {{ $labels.model }}
      expr: llm_kv_cache_utilization > 0.95
      for: 2m
      labels:
        category: memory
        severity: warning
        team: ml-platform
    - alert: LLMErrorRateHigh
      annotations:
        description: 'Error rate is {{ $value | humanizePercentage }}.

          Check error breakdown by type.

          '
        summary: Error rate above 5% for {{ $labels.model }}
      expr: "rate(llm_error_total[5m]) \n/ rate(llm_inference_requests_total[5m]) >\
        \ 0.05\n"
      for: 5m
      labels:
        category: errors
        severity: warning
        team: ml-platform
    - alert: LLMErrorSpike
      annotations:
        description: 'Errors are occurring at {{ $value | printf "%.2f" }}/sec.

          '
        summary: Error spike detected for {{ $labels.model }}
      expr: 'rate(llm_error_total[5m]) > 0.1

        '
      for: 2m
      labels:
        category: errors
        severity: warning
        team: ml-platform
    - alert: LLMOOMErrors
      annotations:
        description: 'Out-of-memory errors detected.

          Model may need to be reloaded or batch size reduced.

          '
        summary: OOM errors occurring for {{ $labels.model }}
      expr: 'increase(llm_error_total{error_type=~"out_of_memory|gpu_memory_exhausted"}[5m])
        > 0

        '
      for: 1m
      labels:
        category: errors
        severity: critical
        team: ml-platform
    - alert: LLMMetalCrashes
      annotations:
        description: 'Metal GPU framework has crashed.

          The system may need to be restarted.

          Check system logs for details.

          '
        summary: Metal framework crash on {{ $labels.instance }}
      expr: 'increase(llm_error_total{error_type="metal_crash"}[5m]) > 0

        '
      for: 0s
      labels:
        category: errors
        pagerduty: trigger
        severity: critical
        team: infrastructure
    - alert: LLMHealthScoreLow
      annotations:
        description: 'Health score is {{ $value | printf "%.0f" }}/100.

          Multiple factors may be degrading model performance.

          Review individual metrics for root cause.

          '
        summary: Model health score low for {{ $labels.model }}
      expr: llm_model_health_score < 70
      for: 10m
      labels:
        category: health
        severity: warning
        team: ml-platform
    - alert: LLMHealthScoreCritical
      annotations:
        description: 'Health score is {{ $value | printf "%.0f" }}/100.

          Model may not be functioning correctly.

          '
        summary: Model health critically low for {{ $labels.model }}
      expr: llm_model_health_score < 50
      for: 5m
      labels:
        category: health
        severity: critical
        team: ml-platform

