apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hallucination-detection-rules
  namespace: opik
  labels:
    release: monitoring
    app.kubernetes.io/name: prometheus-rule
    app.kubernetes.io/part-of: apple-silicon-llm-monitoring
spec:
  groups:
  - interval: 30s
    name: hallucination-detection
    rules:
    - alert: HighOutputEntropy
      annotations:
        dashboard: https://grafana.internal/d/llm-quality?var-model={{ $labels.model
          }}
        description: 'P95 output entropy is {{ $value | printf "%.2f" }}, which exceeds
          the safe threshold of 4.0.


          High entropy indicates the model is uncertain about its outputs.

          This may signal:

          - Out-of-distribution queries

          - Knowledge gaps

          - Potential hallucinations


          Actions:

          - Review recent query patterns

          - Check if model needs fine-tuning updates

          - Consider adding guardrails for high-entropy outputs

          '
        summary: High output entropy for {{ $labels.model }} - potential hallucination
          risk
      expr: "histogram_quantile(0.95, \n  rate(llm_output_entropy_bucket[10m])\n) >\
        \ 4.0\n"
      for: 10m
      labels:
        category: hallucination
        severity: warning
        team: ml-platform
    - alert: EntropySpike
      annotations:
        description: 'P95 entropy has increased 50% above recent baseline.

          This sudden change may indicate:

          - New types of queries

          - Model drift

          - Data quality issues

          '
        summary: Entropy spike detected for {{ $labels.model }}
      expr: "histogram_quantile(0.95, rate(llm_output_entropy_bucket[5m])) \n> (histogram_quantile(0.95,\
        \ rate(llm_output_entropy_bucket[1h] offset 5m)) * 1.5)\n"
      for: 15m
      labels:
        category: hallucination
        severity: warning
        team: ml-platform
    - alert: HighRepetitionScore
      annotations:
        description: 'Repetition score is {{ $value | printf "%.2f" }} (threshold: 0.3).


          High repetition often indicates:

          - Model stuck in loops

          - Degenerate outputs

          - Potential hallucination patterns


          Actions:

          - Check temperature and sampling settings

          - Review repetition penalty configuration

          - Inspect recent outputs for patterns

          '
        summary: High n-gram repetition detected for {{ $labels.model }}
      expr: llm_repetition_score > 0.3
      for: 5m
      labels:
        category: hallucination
        severity: warning
        team: ml-platform
    - alert: SevereRepetition
      annotations:
        description: 'Repetition score is {{ $value | printf "%.2f" }}.

          The model appears to be generating highly repetitive (possibly looping) output.

          This is a critical quality issue.

          '
        summary: Severe repetition in {{ $labels.model }} outputs
      expr: llm_repetition_score > 0.5
      for: 2m
      labels:
        category: hallucination
        severity: critical
        team: ml-platform
    - alert: LowConfidenceOutputs
      annotations:
        description: 'Mean token confidence is {{ $value | printf "%.2f" }}.

          The model is consistently uncertain about its predictions.


          This may indicate:

          - Queries outside training distribution

          - Model capacity issues

          - Need for model updates

          '
        summary: Low confidence outputs from {{ $labels.model }}
      expr: llm_confidence_mean < 0.5
      for: 10m
      labels:
        category: hallucination
        severity: warning
        team: ml-platform
    - alert: ConfidenceDrift
      annotations:
        description: 'Confidence has moved more than 3 standard deviations from the
          hourly average.

          This statistical anomaly may indicate:

          - Change in query distribution

          - Model behavior change

          - Potential quality degradation

          '
        summary: Confidence score drifting from baseline for {{ $labels.model }}
      expr: "abs(llm_confidence_mean - avg_over_time(llm_confidence_mean[1h])) \n/ stddev_over_time(llm_confidence_mean[1h])\
        \ > 3\n"
      for: 15m
      labels:
        category: hallucination
        severity: warning
        team: ml-platform
    - alert: HighConfidenceVariance
      annotations:
        description: 'Confidence standard deviation is {{ $value | printf "%.2f" }}.

          The model''s confidence varies significantly across tokens.

          This may be normal for diverse queries but worth monitoring.

          '
        summary: High confidence variance for {{ $labels.model }}
      expr: llm_confidence_std > 0.3
      for: 10m
      labels:
        category: hallucination
        severity: info
        team: ml-platform
    - alert: HighPerplexity
      annotations:
        description: 'P95 perplexity is {{ $value | printf "%.1f" }}.

          This indicates the model is highly uncertain about its outputs.


          Normal perplexity ranges: 1-30

          Elevated perplexity: 30-50

          High perplexity: 50+

          '
        summary: High perplexity for {{ $labels.model }}
      expr: "histogram_quantile(0.95, \n  rate(llm_perplexity_bucket[10m])\n) > 50\n"
      for: 10m
      labels:
        category: hallucination
        severity: warning
        team: ml-platform
    - alert: HallucinationRiskElevated
      annotations:
        description: 'Multiple hallucination signals are elevated.

          Composite risk score: {{ $value | printf "%.2f" }}


          Contributing factors:

          - Entropy signal

          - Repetition patterns

          - Low confidence

          - High perplexity


          Review output quality and consider implementing guardrails.

          '
        summary: Elevated hallucination risk for {{ $labels.model }}
      expr: "(\n  (histogram_quantile(0.95, rate(llm_output_entropy_bucket[10m])) /\
        \ 5) * 0.3 +\n  llm_repetition_score * 0.3 +\n  (1 - llm_confidence_mean) *\
        \ 0.2 +\n  (histogram_quantile(0.95, rate(llm_perplexity_bucket[10m])) / 100)\
        \ * 0.2\n) > 0.5\n"
      for: 15m
      labels:
        category: hallucination
        severity: warning
        team: ml-platform
    - alert: HallucinationRiskCritical
      annotations:
        description: 'Multiple hallucination signals are at critical levels.


          IMMEDIATE ACTIONS:

          1. Consider taking model offline

          2. Review recent outputs for quality

          3. Check for system issues affecting inference

          4. Investigate query patterns

          '
        summary: CRITICAL hallucination risk for {{ $labels.model }}
      expr: "(\n  (histogram_quantile(0.95, rate(llm_output_entropy_bucket[5m])) / 5)\
        \ * 0.3 +\n  llm_repetition_score * 0.3 +\n  (1 - llm_confidence_mean) * 0.2\
        \ +\n  (histogram_quantile(0.95, rate(llm_perplexity_bucket[5m])) / 100) * 0.2\n\
        ) > 0.7\n"
      for: 5m
      labels:
        category: hallucination
        pagerduty: trigger
        severity: critical
        team: ml-platform
    - alert: HighRefusalRate
      annotations:
        description: '{{ $value | humanizePercentage }} of responses are refusals.

          The model is declining to answer many queries.


          This may indicate:

          - Queries hitting safety guardrails

          - Out-of-scope requests

          - Overly cautious model behavior

          '
        summary: High refusal rate for {{ $labels.model }}
      expr: 'avg_over_time(llm_refusal_rate[15m]) > 0.2

        '
      for: 15m
      labels:
        category: quality
        severity: info
        team: ml-platform
    - alert: RefusalRateSpike
      annotations:
        description: 'More than half of responses are refusals.

          This is unusual and may indicate an issue.

          '
        summary: Refusal rate spike for {{ $labels.model }}
      expr: 'llm_refusal_rate > 0.5

        '
      for: 5m
      labels:
        category: quality
        severity: warning
        team: ml-platform
    - alert: QualityDegradationTrend
      annotations:
        description: 'Confidence scores are trending downward over the past hour.

          Rate of change: {{ $value | printf "%.4f" }}/s


          This gradual degradation may indicate:

          - Model drift

          - Changing query patterns

          - System resource constraints

          '
        summary: Quality degradation trend for {{ $labels.model }}
      expr: 'deriv(llm_confidence_mean[1h]) < -0.01

        '
      for: 1h
      labels:
        category: quality
        severity: warning
        team: ml-platform
