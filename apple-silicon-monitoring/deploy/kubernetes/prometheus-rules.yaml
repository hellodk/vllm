apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: apple-silicon-hardware-rules
  namespace: opik
  labels:
    release: monitoring
    app.kubernetes.io/name: prometheus-rule
    app.kubernetes.io/part-of: apple-silicon-llm-monitoring
spec:
  groups:
  - interval: 30s
    name: apple-silicon-hardware
    rules:
    - alert: GPUHighUtilization
      annotations:
        dashboard: https://grafana.internal/d/apple-silicon/node?var-node={{ $labels.instance
          }}
        description: 'GPU utilization has been at {{ $value | printf "%.1f" }}% for
          over 5 minutes.

          This may indicate the node is under heavy load or a process is stuck.

          '
        runbook_url: https://wiki.company.internal/runbooks/gpu-high-utilization
        summary: GPU utilization sustained above 95% on {{ $labels.instance }}
      expr: apple_gpu_utilization_percent > 95
      for: 5m
      labels:
        category: gpu
        severity: warning
        team: infrastructure
    - alert: GPUMemoryExhaustion
      annotations:
        description: 'GPU memory is at {{ $value | humanizePercentage }} capacity.

          Used: {{ with printf "apple_gpu_memory_used_bytes{instance=''%s''}" $labels.instance
          | query }}{{ . | first | value | humanize1024 }}{{ end }}

          This will cause OOM errors for model inference.

          '
        runbook_url: https://wiki.company.internal/runbooks/gpu-memory-exhaustion
        summary: GPU memory nearly exhausted on {{ $labels.instance }}
      expr: (apple_gpu_memory_used_bytes / apple_gpu_memory_total_bytes) > 0.95
      for: 2m
      labels:
        category: gpu
        severity: critical
        team: infrastructure
    - alert: GPUMemoryLeak
      annotations:
        description: 'GPU memory usage is increasing steadily and will exceed capacity
          within an hour.

          Current trend suggests OOM in approximately 1 hour.

          '
        runbook_url: https://wiki.company.internal/runbooks/gpu-memory-leak
        summary: Potential GPU memory leak on {{ $labels.instance }}
      expr: "predict_linear(apple_gpu_memory_used_bytes[1h], 3600) \n> apple_gpu_memory_total_bytes\
        \ * 1.1\n"
      for: 30m
      labels:
        category: gpu
        severity: warning
        team: infrastructure
    - alert: ThermalThrottlingActive
      annotations:
        description: '{{ $labels.type | title }} thermal throttling is active.

          Performance will be degraded until temperature decreases.

          Check ambient temperature and cooling system.

          '
        runbook_url: https://wiki.company.internal/runbooks/thermal-throttling
        summary: Thermal throttling detected on {{ $labels.instance }} ({{ $labels.type
          }})
      expr: apple_thermal_throttle_active == 1
      for: 1m
      labels:
        category: thermal
        severity: warning
        team: infrastructure
    - alert: CriticalThermalPressure
      annotations:
        description: 'System has reached critical thermal state.

          IMMEDIATE ACTION REQUIRED:

          1. Check if ambient temperature is elevated

          2. Verify cooling system is operational

          3. Consider reducing workload or shutting down node

          '
        runbook_url: https://wiki.company.internal/runbooks/critical-thermal
        summary: CRITICAL thermal pressure on {{ $labels.instance }}
      expr: apple_thermal_pressure{level="critical"} == 1
      for: 30s
      labels:
        category: thermal
        pagerduty: trigger
        severity: critical
        team: infrastructure
    - alert: SustainedThermalPressure
      annotations:
        description: 'System has been in {{ $labels.level }} thermal state for 15 minutes.

          Performance may be impacted. Monitor cooling system.

          '
        summary: Sustained {{ $labels.level }} thermal pressure on {{ $labels.instance
          }}
      expr: 'apple_thermal_pressure{level=~"moderate|heavy"} == 1

        '
      for: 15m
      labels:
        category: thermal
        severity: warning
        team: infrastructure
    - alert: GPUTemperatureHigh
      annotations:
        description: 'GPU temperature is {{ $value | printf "%.1f" }}°C.

          Normal operating range is 40-80°C.

          '
        summary: GPU temperature elevated on {{ $labels.instance }}
      expr: apple_gpu_temperature_celsius > 85
      for: 5m
      labels:
        category: thermal
        severity: warning
        team: infrastructure
    - alert: HighPowerConsumption
      annotations:
        description: 'System power is {{ $value | printf "%.1f" }}W, which is approaching
          maximum TDP.

          M4 Max TDP is approximately 90W.

          '
        summary: High power consumption on {{ $labels.instance }}
      expr: apple_system_power_watts > 80
      for: 10m
      labels:
        category: power
        severity: warning
        team: infrastructure
    - alert: PowerSpike
      annotations:
        description: 'Current power ({{ $value | printf "%.1f" }}W) is significantly
          above the hourly average.

          This may indicate new workload or potential issue.

          '
        summary: Unusual power spike on {{ $labels.instance }}
      expr: "apple_system_power_watts \n> (avg_over_time(apple_system_power_watts[1h])\
        \ + 2 * stddev_over_time(apple_system_power_watts[1h]))\n"
      for: 5m
      labels:
        category: power
        severity: info
        team: infrastructure
    - alert: AppleSiliconExporterDown
      annotations:
        description: 'The apple-silicon-exporter is not responding.

          Hardware metrics are not being collected.

          Check the exporter service on the node.

          '
        runbook_url: https://wiki.company.internal/runbooks/exporter-down
        summary: Apple Silicon Exporter down on {{ $labels.instance }}
      expr: up{job="apple-silicon-exporter"} == 0
      for: 2m
      labels:
        category: exporter
        severity: critical
        team: infrastructure
    - alert: AppleSiliconScrapeSlow
      annotations:
        description: 'IOKit metric collection is taking {{ $value | printf "%.1f" }}s.

          This may indicate system issues.

          '
        summary: Slow metric scrape on {{ $labels.instance }}
      expr: apple_scrape_duration_seconds{collector="iokit"} > 5
      for: 5m
      labels:
        category: exporter
        severity: warning
        team: infrastructure
    - alert: CollectorFailure
      annotations:
        description: 'The {{ $labels.collector }} collector has been failing for 5 minutes.

          Some metrics may be missing.

          '
        summary: '{{ $labels.collector }} collector failing on {{ $labels.instance }}'
      expr: apple_scrape_success{collector=~"iokit|powermetrics|metal"} == 0
      for: 5m
      labels:
        category: exporter
        severity: warning
        team: infrastructure
    - alert: ANEHighUtilization
      annotations:
        description: 'Apple Neural Engine is at {{ $value | printf "%.1f" }}% utilization.

          This is informational - high ANE usage during inference is expected.

          '
        summary: Neural Engine highly utilized on {{ $labels.instance }}
      expr: apple_ane_utilization_percent > 90
      for: 10m
      labels:
        category: ane
        severity: info
        team: ml-platform

