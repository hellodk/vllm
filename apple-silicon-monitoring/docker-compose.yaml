  # Mock Apple Silicon Exporters (20 Mac Minis)
  # ============================================
  mock-exporter-01:
    build: &exporter-build
      context: ./mock-server/mock-exporter
      dockerfile: Dockerfile
    container_name: mock-exporter-01
    environment:
      - PORT=5900
      - NODE_ID=1
    ports:
      - "5900:5900"
    healthcheck: &exporter-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5900/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

