# Docker Compose for Apple Silicon LLM Monitoring Test Environment
# Simulates 20 Mac Mini devices
# All ports are in the 5900-5999 range to avoid collisions
#
# Port Map:
#   5900-5919 - Mock Apple Silicon Exporters (20 nodes)
#   5920 - OTEL Gateway OTLP gRPC
#   5921 - OTEL Gateway OTLP HTTP
#   5922 - OTEL Gateway Prometheus exporter
#   5923 - OTEL Gateway health
#   5930 - Prometheus
#   5940 - Grafana
#   5950 - Alertmanager
#
# Usage:
#   docker-compose up -d
#   
#   Access:
#     - Grafana: http://localhost:5940 (admin/admin)
#     - Prometheus: http://localhost:5930
#     - Alertmanager: http://localhost:5950

services:
