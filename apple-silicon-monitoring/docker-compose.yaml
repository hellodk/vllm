  # ============================================
  # OpenTelemetry Collector - Gateway Mode
  # ============================================
  otel-gateway:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otel-gateway
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/otel-gateway-config-20nodes.yaml:/etc/otel/config.yaml:ro
    ports:
      - "5920:5920"   # OTLP gRPC
      - "5921:5921"   # OTLP HTTP
      - "5922:5922"   # Prometheus exporter
      - "5923:5923"   # Health check
      - "5924:5924"   # Internal metrics
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5923"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================
  # Prometheus
  # ============================================
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.listen-address=0.0.0.0:5930'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus-20nodes.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "5930:5930"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5930/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================
  # Grafana
  # ============================================
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    environment:
      - GF_SERVER_HTTP_PORT=5940
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "5940:5940"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5940/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================
  # Alertmanager
  # ============================================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=0.0.0.0:5950'
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "5950:5950"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5950/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  default:
    name: llm-monitoring-network
