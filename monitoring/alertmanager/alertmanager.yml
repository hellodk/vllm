# monitoring/alertmanager/alertmanager.yml
#
# SRE-7: Updated with multi-burn-rate SLO routing, team/category routing,
# and corrected inhibition rules (node_id/instance normalization).
global:
  resolve_timeout: 5m
  smtp_smarthost: "${ALERTMANAGER_SMTP_SMARTHOST}"
  smtp_from: "${ALERTMANAGER_SMTP_FROM}"
  smtp_auth_username: "${ALERTMANAGER_SMTP_USER}"
  smtp_auth_password: "${ALERTMANAGER_SMTP_PASSWORD}"
  smtp_require_tls: true

route:
  group_by: [alertname, cluster, pool]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-hydra

  routes:

    # ── PagerDuty fast-page (explicit pagerduty: trigger label) ───────────
    # continue: true so the alert also routes to the severity-matched receiver.
    - match:
        pagerduty: trigger
      receiver: pagerduty-critical
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # ── SLO burn-rate alerts — team + category routing ────────────────────
    # Fast burn: critical, page to slack-and-email (PagerDuty handled above).
    - match:
        category: slo
        burn_rate: fast
      receiver: slack-and-email
      group_by: [alertname, cluster, slo, provider, model]
      group_wait: 10s
      repeat_interval: 30m

    # Slow burn: warning, Slack only with longer repeat.
    - match:
        category: slo
        burn_rate: slow
      receiver: slack-hydra
      group_by: [alertname, cluster, slo, provider, model]
      group_wait: 2m
      repeat_interval: 6h

    # ── RDMA/GPU fabric alerts ────────────────────────────────────────────
    - match:
        category: rdma
        severity: critical
      receiver: slack-and-email
      group_by: [alertname, cluster, tp_group]
      group_wait: 10s
      repeat_interval: 30m

    - match:
        category: rdma
        severity: warning
      receiver: slack-hydra
      group_by: [alertname, cluster, tp_group]
      repeat_interval: 2h

    # ── ML platform alerts (LLM inference, KV cache, scheduler) ──────────
    - match:
        team: ml-platform
        severity: critical
      receiver: slack-and-email
      group_wait: 10s
      repeat_interval: 1h

    - match:
        team: ml-platform
        severity: warning
      receiver: slack-hydra
      repeat_interval: 4h

    # ── SRE team alerts (storage, network, platform backends) ─────────────
    - match:
        team: sre
        severity: critical
      receiver: slack-and-email
      group_wait: 10s
      repeat_interval: 1h

    - match:
        team: sre
        severity: warning
      receiver: slack-hydra
      repeat_interval: 4h

    # ── Generic severity routing (fallback) ───────────────────────────────
    - match:
        severity: critical
      receiver: slack-and-email
      group_wait: 10s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: slack-hydra
      repeat_interval: 4h

receivers:
  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "${ALERTMANAGER_PAGERDUTY_KEY}"
        severity: critical
        description: |
          {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
        details:
          cluster: "{{ .CommonLabels.cluster }}"
          alertname: "{{ .CommonLabels.alertname }}"
          description: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
          runbook: "{{ range .Alerts }}{{ .Annotations.runbook_url }}{{ end }}"

  - name: slack-hydra
    slack_configs:
      - api_url: "${ALERTMANAGER_SLACK_WEBHOOK}"
        channel: "${ALERTMANAGER_SLACK_CHANNEL:-#hydra-alerts}"
        icon_emoji: ":robot_face:"
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Pool:* {{ .Labels.pool }}
          *Node:* {{ .Labels.instance }}
          {{ end }}

  - name: email-hydra
    email_configs:
      - to: "${ALERTMANAGER_SMTP_TO}"
        send_resolved: true
        headers:
          subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} on {{ .CommonLabels.node_id }}'

  - name: slack-and-email
    slack_configs:
      - api_url: "${ALERTMANAGER_SLACK_WEBHOOK}"
        channel: "${ALERTMANAGER_SLACK_CHANNEL:-#hydra-alerts}"
        icon_emoji: ":robot_face:"
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Pool:* {{ .Labels.pool }}
          *Node:* {{ .Labels.instance }}
          {{ end }}
    email_configs:
      - to: "${ALERTMANAGER_SMTP_TO}"
        send_resolved: true
        headers:
          subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} on {{ .CommonLabels.node_id }}'

inhibit_rules:
  # Critical suppresses warning for the same alert on the same node.
  # Use node_id OR instance (hardware alerts use node_id; engine alerts use instance).
  # Two inhibit rules cover both label shapes.
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, cluster, node_id]

  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, cluster, instance]

  # SLO fast-burn inhibits slow-burn for the same SLO + engine combination.
  # Prevents duplicate notifications when a fast-burn condition is already paging.
  - source_match:
      category: slo
      burn_rate: fast
    target_match:
      category: slo
      burn_rate: slow
    equal: [cluster, slo, provider, model, node_id]

  # RDMA critical (pause storm, hardware absent) inhibits RDMA warnings —
  # both will have tp_group label if set, or fall through to instance.
  - source_match:
      category: rdma
      severity: critical
    target_match:
      category: rdma
      severity: warning
    equal: [cluster, node_id]
