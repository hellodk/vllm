# monitoring/grafana/provisioning/datasources/datasources.yml
apiVersion: 1

datasources:
  - name: VictoriaMetrics
    type: prometheus
    uid: victoria-metrics
    url: http://victoria-metrics:8428
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      # Exemplars link a metric data point to its originating trace in Tempo.
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      maxLines: 5000

  - name: Alertmanager
    type: alertmanager
    uid: alertmanager
    url: http://alertmanager:9093
    access: proxy
    jsonData:
      handleGrafanaManagedAlerts: false
      implementation: prometheus

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    jsonData:
      # Service graph is generated by Tempo's metrics-generator (writes
      # traces_service_graph_* into VictoriaMetrics via remote_write).
      serviceMap:
        datasourceUid: victoria-metrics
      nodeGraph:
        enabled: true
      # Span → Loki logs: jump from a span to logs sharing the same labels.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        filterByTraceID: true
        filterBySpanID: false
        tags:
          - key: service.name
            value: service_name
      # Span → metrics: jump from a span to the LLM RED metrics for that model.
      tracesToMetrics:
        datasourceUid: victoria-metrics
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        tags:
          - key: llm.model
            value: model
        queries:
          - name: "e2e latency p95"
            query: "hydra:llm:request_e2e_seconds:p95{model=\"$__tags\"}"
          - name: "request rate"
            query: "hydra:llm:requests:rate1m{model=\"$__tags\"}"
