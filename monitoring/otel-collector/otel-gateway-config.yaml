# monitoring/otel-collector/otel-gateway-config.yaml
# Central OTEL Collector gateway — receives from all 28 nodes via OTLP,
# enriches with cluster label, ships to Victoria Metrics + Loki + Opik.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

  prometheus:
    config:
      scrape_configs:
        - job_name: otel-self
          static_configs:
            - targets: ["localhost:8888"]

processors:
  # memory_limiter MUST be first — it sheds load before the pipeline fills.
  # soft limit triggers GC; hard limit drops data rather than OOMing the process.
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

  batch:
    # Smaller batches reduce tail latency; 4 k metrics / 5 s is comfortably
    # under the default VictoriaMetrics ingest limit of 100 k rows/request.
    send_batch_size: 4000
    send_batch_max_size: 8000
    timeout: 5s

  resource:
    attributes:
      - key: cluster
        value: hydra
        action: upsert
      - key: environment
        value: production
        action: upsert

  resourcedetection:
    detectors: [env, system]
    timeout: 5s

  filter/exclude_health:
    metrics:
      exclude:
        match_type: regexp
        metric_names:
          - ".*_health_.*"

exporters:
  prometheusremotewrite:
    endpoint: "http://victoria-metrics:8428/api/v1/write"
    tls:
      insecure: true
    # Retry transient ingest errors; queue absorbs scrape bursts.
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 2000

  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"
    tls:
      insecure: true
    default_labels_enabled:
      exporter: false
      job: true
      instance: true
      level: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 2
      queue_size: 1000

  otlphttp/opik:
    endpoint: "http://opik-backend:8080"
    traces_endpoint: "http://opik-backend:8080/api/v1/traces"
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 60s
      max_elapsed_time: 300s

  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers:  [otlp, prometheus]
      processors: [memory_limiter, resourcedetection, resource, filter/exclude_health, batch]
      exporters:  [prometheusremotewrite]

    logs:
      receivers:  [otlp]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters:  [loki]

    traces:
      receivers:  [otlp]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters:  [otlphttp/opik, otlp/tempo]

  telemetry:
    logs:
      level: info
    metrics:
      address: "0.0.0.0:8888"
