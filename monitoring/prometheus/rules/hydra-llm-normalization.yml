# monitoring/prometheus/rules/hydra-llm-normalization.yml
#
# Cross-engine metric normalization layer.
# Maps engine-native metric names into a unified hydra:llm:* namespace so that
# dashboards and alerts can target a single series name regardless of which
# inference engine is running on a node.
#
# Architecture note: all LLM metrics arrive via OTEL push (not direct Prometheus
# scrape). The OTEL agent attaches `provider` and `node_id` to every metric via
# metric_relabel_configs in otel-agent-config.yaml.j2. The `model` label is
# emitted by the engines themselves and passes through unmodified.
# The `or` operator merges results from different engines into a single rule;
# the `provider` label keeps each engine's series distinct at query time.
#
# ┌────────────────────────────────────────────────────────────────────────────────────────┐
# │ hydra:llm:* unified series          │ vLLM / vLLM-MLX source          │ SGLang source              │
# ├─────────────────────────────────────┼─────────────────────────────────┼────────────────────────────┤
# │ up                                  │ up{job=~"llm-.*"}               │ up{job=~"llm-.*"}          │
# │ ttft_seconds:{p50,p95,p99}          │ vllm:time_to_first_token_       │ sglang:time_to_first_      │
# │                                     │   seconds_bucket                │   token_seconds_bucket     │
# │ tokens_generated:rate1m             │ vllm:generation_tokens_total    │ sglang:num_generated_      │
# │                                     │                                 │   tokens_total             │
# │ requests_running                    │ vllm:num_requests_running       │ sglang:num_running_reqs    │
# │ requests_waiting                    │ vllm:num_requests_waiting       │ sglang:num_waiting_reqs    │
# │ kv_cache_usage_ratio                │ vllm:gpu_cache_usage_perc       │ sglang:token_usage         │
# │                                     │   (0–1 fraction; ⚠ see note 1) │ (0–1 fraction)             │
# │ prefix_cache_hit_ratio              │ rate(vllm:prefix_cache_         │ sglang:cache_hit_rate      │
# │                                     │   hits_total[5m]) /             │ (direct ratio gauge)       │
# │                                     │   rate(vllm:prefix_cache_       │                            │
# │                                     │   queries_total[5m])            │                            │
# │ errors:rate5m                       │ rate(vllm:request_success_      │ ⚠ no standard counter;     │
# │                                     │   total{finished_reason=        │   rule omitted pending     │
# │                                     │   "abort"}[5m]) [proxy]         │   live-node confirmation   │
# │ request_e2e_seconds:p95             │ vllm:e2e_request_latency_       │ sglang:e2e_request_        │
# │                                     │   seconds_bucket                │   latency_seconds_bucket   │
# └─────────────────────────────────────┴─────────────────────────────────┴────────────────────────────┘
#
# ⚠ Metrics requiring live-node confirmation before trusting values:
#
#   1. vllm:gpu_cache_usage_perc — vLLM ≥0.4 exports a 0–1 fraction despite
#      the "perc" suffix. Builds prior to 0.4 exported 0–100 and would require
#      dividing by 100 here. Verify:
#        curl -s http://<node>:8000/metrics | grep gpu_cache_usage_perc
#
#   2. vllm:prefix_cache_hits_total / vllm:prefix_cache_queries_total — metric
#      names changed across vLLM versions. Older builds may expose these as
#      vllm:prefix_caching_requests_total or vllm:cache_{hit,miss}_total.
#      Verify: curl -s http://<node>:8000/metrics | grep -i prefix_cache
#
#   3. vllm:request_success_total{finished_reason="abort"} — standard vLLM does
#      not use finished_reason="error". The "abort" value is the closest proxy
#      for abnormally terminated requests (includes client disconnects and
#      server-side cancellations). Verify label values:
#        curl -s http://<node>:8000/metrics | grep request_success_total
#
#   4. SGLang error counter — SGLang does not expose a standard error/abort
#      counter in its default Prometheus metrics. The hydra:llm:errors:rate5m
#      rule below has no SGLang entry. Add one when a confirmed metric name is
#      available (candidate: sglang:num_aborted_requests_total).
#
#   5. sglang:e2e_request_latency_seconds_bucket — some SGLang builds expose
#      only _sum and _count without histogram buckets. If histogram_quantile()
#      returns NaN for SGLang nodes, confirm with:
#        curl -s http://<node>:30000/metrics | grep e2e_request_latency

groups:
  - name: hydra_llm_normalization
    interval: 30s
    rules:

      # ── hydra:llm:up ──────────────────────────────────────────────────────
      # Engine scrape health: 1 = scrape succeeded, 0 = scrape failed.
      # Inherits provider and node_id from OTEL relabeling. The `model` label
      # is absent on the up metric (it is target-level, not series-level).
      - record: hydra:llm:up
        expr: up{job=~"llm-.*"}

      # ── hydra:llm:ttft_seconds:p50 ────────────────────────────────────────
      # Time-to-first-token p50 by (provider, model, node_id); 5-minute window.
      # vLLM source: vllm:time_to_first_token_seconds_bucket
      # SGLang source: sglang:time_to_first_token_seconds_bucket
      - record: hydra:llm:ttft_seconds:p50
        expr: |
          histogram_quantile(0.50, sum by (le, provider, model, node_id) (
            rate(vllm:time_to_first_token_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.50, sum by (le, provider, model, node_id) (
            rate(sglang:time_to_first_token_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.50, sum by (le, provider, model, node_id) (
            rate(mlx:time_to_first_token_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.50, sum by (le, provider, model, node_id) (
            rate(exo:time_to_first_token_seconds_bucket[5m])
          ))

      # ── hydra:llm:ttft_seconds:p95 ────────────────────────────────────────
      # vLLM source: vllm:time_to_first_token_seconds_bucket
      # SGLang source: sglang:time_to_first_token_seconds_bucket
      - record: hydra:llm:ttft_seconds:p95
        expr: |
          histogram_quantile(0.95, sum by (le, provider, model, node_id) (
            rate(vllm:time_to_first_token_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.95, sum by (le, provider, model, node_id) (
            rate(sglang:time_to_first_token_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.95, sum by (le, provider, model, node_id) (
            rate(mlx:time_to_first_token_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.95, sum by (le, provider, model, node_id) (
            rate(exo:time_to_first_token_seconds_bucket[5m])
          ))

      # ── hydra:llm:ttft_seconds:p99 ────────────────────────────────────────
      # vLLM source: vllm:time_to_first_token_seconds_bucket
      # SGLang source: sglang:time_to_first_token_seconds_bucket
      - record: hydra:llm:ttft_seconds:p99
        expr: |
          histogram_quantile(0.99, sum by (le, provider, model, node_id) (
            rate(vllm:time_to_first_token_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.99, sum by (le, provider, model, node_id) (
            rate(sglang:time_to_first_token_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.99, sum by (le, provider, model, node_id) (
            rate(mlx:time_to_first_token_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.99, sum by (le, provider, model, node_id) (
            rate(exo:time_to_first_token_seconds_bucket[5m])
          ))

      # ── hydra:llm:tokens_generated:rate1m ────────────────────────────────
      # Generation throughput (tokens/second, 1-minute sliding window).
      # vLLM source: vllm:generation_tokens_total
      # SGLang source: sglang:num_generated_tokens_total
      - record: hydra:llm:tokens_generated:rate1m
        expr: |
          sum by (provider, model, node_id) (
            rate(vllm:generation_tokens_total[1m])
          )
          or
          sum by (provider, model, node_id) (
            rate(sglang:num_generated_tokens_total[1m])
          )
          or
          sum by (provider, model, node_id) (
            rate(mlx:generation_tokens_total[1m])
          )
          or
          sum by (provider, model, node_id) (
            rate(exo:generation_tokens_total[1m])
          )

      # ── hydra:llm:requests_running ────────────────────────────────────────
      # Requests currently being decoded (occupying KV-cache slots).
      # vLLM source: vllm:num_requests_running
      # SGLang source: sglang:num_running_reqs
      - record: hydra:llm:requests_running
        expr: vllm:num_requests_running or sglang:num_running_reqs or mlx:num_requests_running or exo:num_requests_running

      # ── hydra:llm:requests_waiting ────────────────────────────────────────
      # Requests queued, awaiting a free KV-cache slot.
      # vLLM source: vllm:num_requests_waiting
      # SGLang source: sglang:num_waiting_reqs
      - record: hydra:llm:requests_waiting
        expr: vllm:num_requests_waiting or sglang:num_waiting_reqs or mlx:num_requests_waiting or exo:num_requests_waiting

      # ── hydra:llm:kv_cache_usage_ratio ───────────────────────────────────
      # KV-cache fill fraction (0–1). Both engines target the 0–1 range.
      # ⚠ vllm:gpu_cache_usage_perc: see note 1 in header regarding unit
      #   ambiguity between 0–1 and 0–100 across vLLM versions.
      # vLLM source: vllm:gpu_cache_usage_perc
      # SGLang source: sglang:token_usage
      # ⚠ mlx:/exo: gpu_cache_usage_perc is a best-effort ESTIMATE from the perf
      #   proxy (active tokens / (max_kv * concurrency)) — pure mlx_lm/exo expose
      #   no true KV occupancy. Treat as a saturation signal, not ground truth.
      - record: hydra:llm:kv_cache_usage_ratio
        expr: vllm:gpu_cache_usage_perc or sglang:token_usage or mlx:gpu_cache_usage_perc or exo:gpu_cache_usage_perc

      # ── hydra:llm:prefix_cache_hit_ratio ─────────────────────────────────
      # Fraction of prefill tokens served from prefix/prompt cache (0–1).
      # ⚠ vLLM metric names: see note 2 in header.
      # vLLM source: rate(vllm:prefix_cache_hits_total) / rate(vllm:prefix_cache_queries_total)
      # SGLang source: sglang:cache_hit_rate (direct ratio gauge — no counter arithmetic needed)
      - record: hydra:llm:prefix_cache_hit_ratio
        expr: |
          (
            rate(vllm:prefix_cache_hits_total[5m])
              /
            rate(vllm:prefix_cache_queries_total[5m])
          )
          or
          sglang:cache_hit_rate

      # ── hydra:llm:errors:rate5m ───────────────────────────────────────────
      # Abnormally terminated request rate (requests/second, 5-minute window).
      # ⚠ vLLM: finished_reason="abort" is the proxy for error/abort requests;
      #   standard vLLM does not emit finished_reason="error". See note 3.
      # ⚠ SGLang: no standard error counter available; omitted until a confirmed
      #   metric name is identified on a live node. See note 4.
      # vLLM source: vllm:request_success_total{finished_reason="abort"}
      - record: hydra:llm:errors:rate5m
        expr: |
          sum by (provider, model, node_id) (
            rate(vllm:request_success_total{finished_reason="abort"}[5m])
          )
          or
          sum by (provider, model, node_id) (
            rate(mlx:request_success_total{finished_reason="abort"}[5m])
          )
          or
          sum by (provider, model, node_id) (
            rate(exo:request_success_total{finished_reason="abort"}[5m])
          )

      # ── hydra:llm:request_e2e_seconds:p95 ────────────────────────────────
      # End-to-end request latency p95 (seconds), from prefill start to last token.
      # ⚠ SGLang histogram bucket availability: see note 5 in header.
      # vLLM source: vllm:e2e_request_latency_seconds_bucket
      # SGLang source: sglang:e2e_request_latency_seconds_bucket
      - record: hydra:llm:request_e2e_seconds:p95
        expr: |
          histogram_quantile(0.95, sum by (le, provider, model, node_id) (
            rate(vllm:e2e_request_latency_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.95, sum by (le, provider, model, node_id) (
            rate(sglang:e2e_request_latency_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.95, sum by (le, provider, model, node_id) (
            rate(mlx:e2e_request_latency_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.95, sum by (le, provider, model, node_id) (
            rate(exo:e2e_request_latency_seconds_bucket[5m])
          ))

      # ── hydra:llm:preemption:rate5m ──────────────────────────────────────
      # Rate of vLLM paged-attention preemptions (request evictions from KV cache)
      # over a 5-minute window.  Non-zero sustained rate indicates KV thrashing —
      # requests are being swapped out to host memory and re-scheduled.
      # vLLM source: vllm:num_preemptions_total (counter)
      # SGLang: no equivalent counter; omitted pending live-node confirmation.
      - record: hydra:llm:preemption:rate5m
        expr: rate(vllm:num_preemptions_total[5m])

      # ── hydra:llm:running_waiting_ratio ──────────────────────────────────
      # Ratio of actively-decoding requests to queued requests.
      # High ratio (>>1) → engine is efficiently saturated.
      # Ratio approaching 0 (many waiting, few running) → KV cache bottleneck.
      # clamp_min(waiting, 1) prevents division-by-zero when the queue is empty.
      # vLLM source: vllm:num_requests_running / clamp_min(vllm:num_requests_waiting, 1)
      # SGLang source: sglang:num_running_reqs / clamp_min(sglang:num_waiting_reqs, 1)
      - record: hydra:llm:running_waiting_ratio
        expr: |
          (vllm:num_requests_running / clamp_min(vllm:num_requests_waiting, 1))
          or
          (sglang:num_running_reqs / clamp_min(sglang:num_waiting_reqs, 1))
          or
          (mlx:num_requests_running / clamp_min(mlx:num_requests_waiting, 1))
          or
          (exo:num_requests_running / clamp_min(exo:num_requests_waiting, 1))

      # ── hydra:llm:tpot_seconds:p95 ───────────────────────────────────────
      # Time-per-output-token p95 (inter-token latency, seconds).
      # vLLM source:  vllm:time_per_output_token_seconds_bucket
      # mlx/exo:      proxy-measured (e2e - ttft) / (out_tokens - 1).
      - record: hydra:llm:tpot_seconds:p95
        expr: |
          histogram_quantile(0.95, sum by (le, provider, model, node_id) (
            rate(vllm:time_per_output_token_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.95, sum by (le, provider, model, node_id) (
            rate(mlx:time_per_output_token_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.95, sum by (le, provider, model, node_id) (
            rate(exo:time_per_output_token_seconds_bucket[5m])
          ))

      # ════════════════════════════════════════════════════════════════════════
      # Hetu gap-closure rules (request rate, success rate, latency p50/p99,
      # token rollups, error taxonomy, models loaded, unified-memory headroom).
      # Added to reach parity with the external cluster_intel_* / ollama_* suite.
      # ════════════════════════════════════════════════════════════════════════

      # ── hydra:llm:requests:rate1m ────────────────────────────────────────────
      # Completed request throughput (requests/second, 1-minute window), all
      # finish reasons. SGLang has no success counter → vLLM / mlx / exo only.
      - record: hydra:llm:requests:rate1m
        expr: |
          sum by (provider, model, node_id) (rate(vllm:request_success_total[1m]))
          or
          sum by (provider, model, node_id) (rate(mlx:request_success_total[1m]))
          or
          sum by (provider, model, node_id) (rate(exo:request_success_total[1m]))

      # ── hydra:llm:success_rate ───────────────────────────────────────────────
      # Fraction of completed requests that finished normally (1 = no aborts).
      # success = all finish reasons except "abort"; window 5m for stability.
      - record: hydra:llm:success_rate
        expr: |
          (
            sum by (provider, model, node_id) (rate(vllm:request_success_total{finished_reason!="abort"}[5m]))
            /
            clamp_min(sum by (provider, model, node_id) (rate(vllm:request_success_total[5m])), 0.0001)
          )
          or
          (
            sum by (provider, model, node_id) (rate(mlx:request_success_total{finished_reason!="abort"}[5m]))
            /
            clamp_min(sum by (provider, model, node_id) (rate(mlx:request_success_total[5m])), 0.0001)
          )
          or
          (
            sum by (provider, model, node_id) (rate(exo:request_success_total{finished_reason!="abort"}[5m]))
            /
            clamp_min(sum by (provider, model, node_id) (rate(exo:request_success_total[5m])), 0.0001)
          )

      # ── hydra:llm:request_e2e_seconds:p50 / :p99 ─────────────────────────────
      # Complements the existing :p95. Matches Hetu's p50/p99 latency tiles.
      - record: hydra:llm:request_e2e_seconds:p50
        expr: |
          histogram_quantile(0.50, sum by (le, provider, model, node_id) (
            rate(vllm:e2e_request_latency_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.50, sum by (le, provider, model, node_id) (
            rate(sglang:e2e_request_latency_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.50, sum by (le, provider, model, node_id) (
            rate(mlx:e2e_request_latency_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.50, sum by (le, provider, model, node_id) (
            rate(exo:e2e_request_latency_seconds_bucket[5m])
          ))

      - record: hydra:llm:request_e2e_seconds:p99
        expr: |
          histogram_quantile(0.99, sum by (le, provider, model, node_id) (
            rate(vllm:e2e_request_latency_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.99, sum by (le, provider, model, node_id) (
            rate(sglang:e2e_request_latency_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.99, sum by (le, provider, model, node_id) (
            rate(mlx:e2e_request_latency_seconds_bucket[5m])
          ))
          or
          histogram_quantile(0.99, sum by (le, provider, model, node_id) (
            rate(exo:e2e_request_latency_seconds_bucket[5m])
          ))

      # ── hydra:llm:tokens_input:rate1m ────────────────────────────────────────
      # Prompt (input) token ingest rate (tokens/second, 1-minute window).
      # Complements the existing hydra:llm:tokens_generated:rate1m (output side).
      - record: hydra:llm:tokens_input:rate1m
        expr: |
          sum by (provider, model, node_id) (rate(vllm:prompt_tokens_total[1m]))
          or
          sum by (provider, model, node_id) (rate(sglang:num_prompt_tokens_total[1m]))
          or
          sum by (provider, model, node_id) (rate(mlx:prompt_tokens_total[1m]))
          or
          sum by (provider, model, node_id) (rate(exo:prompt_tokens_total[1m]))

      # ── hydra:llm:tokens_input:increase1h / tokens_output:increase1h ─────────
      # Hourly token volume rollups (cost / capacity accounting). Mirrors Hetu's
      # hourly token counters used for spend dashboards.
      - record: hydra:llm:tokens_input:increase1h
        expr: |
          sum by (provider, model, node_id) (increase(vllm:prompt_tokens_total[1h]))
          or
          sum by (provider, model, node_id) (increase(mlx:prompt_tokens_total[1h]))
          or
          sum by (provider, model, node_id) (increase(exo:prompt_tokens_total[1h]))

      - record: hydra:llm:tokens_output:increase1h
        expr: |
          sum by (provider, model, node_id) (increase(vllm:generation_tokens_total[1h]))
          or
          sum by (provider, model, node_id) (increase(sglang:num_generated_tokens_total[1h]))
          or
          sum by (provider, model, node_id) (increase(mlx:generation_tokens_total[1h]))
          or
          sum by (provider, model, node_id) (increase(exo:generation_tokens_total[1h]))

      # ── hydra:llm:errors_by_type:rate5m ──────────────────────────────────────
      # Error taxonomy (requests/second by error_type), Hetu cluster_intel_llm_
      # errors_total equivalent. Emitted by the perf-proxy (errors_total) for
      # mlx/exo: timeout, connection, connection_refused, rate_limit,
      # parse_error, upstream_5xx, client_4xx, proxy_error.
      - record: hydra:llm:errors_by_type:rate5m
        expr: |
          sum by (provider, model, node_id, error_type) (rate(mlx:errors_total[5m]))
          or
          sum by (provider, model, node_id, error_type) (rate(exo:errors_total[5m]))

      # ── hydra:llm:models_loaded ──────────────────────────────────────────────
      # Distinct model count currently serving per provider/node. Derived from
      # the running-requests gauge series (one series per loaded model).
      # Mirrors Hetu's "models loaded" count tile.
      - record: hydra:llm:models_loaded
        expr: |
          count by (provider, node_id) (
            count by (provider, node_id, model) (hydra:llm:requests_running)
          )

      # ── hydra:llm:gpu_memory_usage_ratio ─────────────────────────────────────
      # Apple unified memory IS the GPU/VRAM pool — this surfaces the existing
      # apple_gpu_memory_* gauges (already alerted on in mlx-alerts.yml) into the
      # hydra:llm:* namespace so dashboards have one consistent name.
      - record: hydra:llm:gpu_memory_usage_ratio
        expr: |
          apple_gpu_memory_used_bytes / clamp_min(apple_gpu_memory_total_bytes, 1)
