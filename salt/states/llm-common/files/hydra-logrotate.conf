# /etc/newsyslog.d/hydra.conf
# Managed by Ansible (llm-common role) — do not edit manually.
# newsyslog format: logfile [owner:group] mode count size(KB) when [flags]
# count=7 keeps 7 archives; size=51200 = rotate at 50 MB; J = bzip2 compress

/var/log/hydra/mlx-server.log              root:wheel  644  7  51200  *  J
/var/log/hydra/mlx-server-error.log        root:wheel  644  7  10240  *  J
/var/log/hydra/vllm-server.log             root:wheel  644  7  51200  *  J
/var/log/hydra/vllm-server-error.log       root:wheel  644  7  10240  *  J
/var/log/hydra/airllm-server.log           root:wheel  644  7  51200  *  J
/var/log/hydra/airllm-server-error.log     root:wheel  644  7  10240  *  J
/var/log/hydra/bitnet-server.log           root:wheel  644  7  51200  *  J
/var/log/hydra/bitnet-server-error.log     root:wheel  644  7  10240  *  J
/var/log/hydra/exo.log                     root:wheel  644  7  51200  *  J
/var/log/hydra/exo-error.log               root:wheel  644  7  10240  *  J
/var/log/hydra/litellm.log                 root:wheel  644  7  51200  *  J
/var/log/hydra/litellm-error.log           root:wheel  644  7  10240  *  J
/var/log/hydra/minio.log                   root:wheel  644  7  51200  *  J
