# ansible/roles/base/tasks/main.yml
---
- name: Create Hydra config directory
  file:
    path: /etc/hydra
    state: directory
    mode: "0755"
  become: true

- name: Create Hydra data directory (Linux)
  file:
    path: /var/lib/hydra
    state: directory
    mode: "0755"
  become: true
  when: hydra_os == "linux"

- name: Create Hydra log directory
  file:
    path: /var/log/hydra
    state: directory
    mode: "0755"
  become: true

# ── OTEL agent: Linux — air-gapped installation (pre-staged tarball) ─────────
# Operator must pre-stage the tarball in ansible/roles/base/files/ before run.
# See ansible/roles/base/files/README.md for download instructions.

- name: Set OTEL agent tarball name (Linux aarch64)
  set_fact:
    otel_tarball: "otelcol-contrib_{{ hydra_versions.otel_agent }}_linux_arm64.tar.gz"
    otel_binary_path: /usr/local/bin/otelcol-contrib
    otel_arch_key: linux_arm64
  when: hydra_os == "linux" and ansible_architecture in ["aarch64", "arm64"]

- name: Set OTEL agent tarball name (Linux x86_64)
  set_fact:
    otel_tarball: "otelcol-contrib_{{ hydra_versions.otel_agent }}_linux_amd64.tar.gz"
    otel_binary_path: /usr/local/bin/otelcol-contrib
    otel_arch_key: linux_amd64
  when: hydra_os == "linux" and ansible_architecture == "x86_64"

- name: Assert OTEL agent tarball is pre-staged (Linux)
  local_action:
    module: stat
    path: "{{ role_path }}/files/{{ otel_tarball }}"
    checksum_algorithm: sha256
    get_checksum: true
  register: _otel_tarball_stat
  when: hydra_os == "linux"

- name: Verify OTEL agent tarball sha256 against hydra_artifact_checksums (Linux, ANS-4)
  assert:
    that:
      - hydra_artifact_checksums['otel_agent'][otel_arch_key] is defined
      - _otel_tarball_stat.stat.checksum == hydra_artifact_checksums['otel_agent'][otel_arch_key]
    fail_msg: >-
      sha256 mismatch for {{ otel_tarball }}:
      staged={{ _otel_tarball_stat.stat.checksum | default('<missing>') }}
      expected={{ hydra_artifact_checksums['otel_agent'][otel_arch_key] | default('<unpinned>') }}
  when: hydra_os == "linux" and _otel_tarball_stat.stat.exists

- name: Fail if OTEL agent tarball is missing (Linux)
  fail:
    msg: |
      Missing pre-staged tarball: {{ role_path }}/files/{{ otel_tarball }}
      Download from:
        https://github.com/open-telemetry/opentelemetry-collector-releases/releases/tag/v{{ hydra_versions.otel_agent }}
      Place the tarball in ansible/roles/base/files/ then re-run.
  when: hydra_os == "linux" and not _otel_tarball_stat.stat.exists

- name: Copy OTEL agent tarball to target (Linux)
  copy:
    src: "{{ otel_tarball }}"
    dest: "/tmp/{{ otel_tarball }}"
    mode: "0644"
  become: true
  when: hydra_os == "linux"

- name: Extract OTEL agent binary from tarball (Linux)
  unarchive:
    src: "/tmp/{{ otel_tarball }}"
    dest: /usr/local/bin
    remote_src: true
    creates: "{{ otel_binary_path }}"
    extra_opts: [--strip-components=0]
  become: true
  when: hydra_os == "linux"

- name: Clean up OTEL agent tarball from /tmp (Linux)
  file:
    path: "/tmp/{{ otel_tarball }}"
    state: absent
  become: true
  when: hydra_os == "linux"

# ── OTEL agent: macOS — internet fetch (air-gap fix tracked in separate ticket) ──

- name: Set OTEL agent download URL (macOS arm64)
  set_fact:
    otel_download_url: >-
      {{ otel_agent_download_base }}/v{{ hydra_versions.otel_agent }}/otelcol-contrib_{{ hydra_versions.otel_agent }}_darwin_arm64.tar.gz
    otel_binary_path: /usr/local/bin/otelcol-contrib
    otel_arch_key: darwin_arm64
  when: hydra_os == "macos"

- name: Download and extract OTEL agent (macOS, sha256-checked — ANS-4)
  unarchive:
    src: "{{ otel_download_url }}"
    dest: /usr/local/bin
    remote_src: true
    creates: "{{ otel_binary_path }}"
    extra_opts: [--strip-components=0]
  become: true
  when: hydra_os == "macos"

# ─────────────────────────────────────────────────────────────────────────────

- name: Ensure OTEL binary is executable
  file:
    path: "{{ otel_binary_path }}"
    mode: "0755"
  become: true

- name: Assert OTEL binary version matches the pin (ANS-4)
  command: "{{ otel_binary_path }} --version"
  become: true
  register: _otel_installed_ver
  changed_when: false

- name: Verify reported OTEL version contains hydra_versions.otel_agent
  assert:
    that: hydra_versions.otel_agent in _otel_installed_ver.stdout
    fail_msg: >-
      otelcol-contrib reports '{{ _otel_installed_ver.stdout | trim }}',
      expected pin {{ hydra_versions.otel_agent }}.

- name: Install systemd service unit (Linux)
  template:
    src: otel-agent.service.j2
    dest: /etc/systemd/system/otel-agent.service
    mode: "0644"
  become: true
  when: hydra_os == "linux"
  notify: reload systemd

- name: Install LaunchDaemon plist (macOS)
  template:
    src: otel-agent.plist.j2
    dest: /Library/LaunchDaemons/com.hydra.otel-agent.plist
    mode: "0644"
    owner: root
    group: wheel
  become: true
  when: hydra_os == "macos"

- name: Bootstrap OTEL agent service domain (macOS — required before kickstart)
  command: launchctl bootstrap system /Library/LaunchDaemons/com.hydra.otel-agent.plist
  become: true
  when: hydra_os == "macos"
  ignore_errors: true   # safe on re-run: domain already exists

- name: Enable OTEL agent on boot (Linux)
  systemd:
    name: otel-agent
    enabled: true
    daemon_reload: true
  become: true
  when: hydra_os == "linux"
