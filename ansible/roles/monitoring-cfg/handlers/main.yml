# ansible/roles/monitoring-cfg/handlers/main.yml
---
- name: validate and restart otel agent
  block:
    - name: Validate OTEL config (dry-run)
      ansible.builtin.command: /usr/local/bin/otelcol-contrib validate --config /etc/hydra/otel-agent-config.yaml
      become: true

    - name: Restart OTEL agent (Linux)
      ansible.builtin.systemd:
        name: otel-agent
        state: restarted
      become: true
      when: hydra_os == "linux"

    - name: Unload and reload OTEL LaunchDaemon (macOS)
      ansible.builtin.shell: |
        launchctl bootout system/com.hydra.otel-agent 2>/dev/null || true
        launchctl bootstrap system /Library/LaunchDaemons/com.hydra.otel-agent.plist
      become: true
      when: hydra_os == "macos"
