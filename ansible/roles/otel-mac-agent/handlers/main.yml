# ansible/roles/otel-mac-agent/handlers/main.yml
---
- name: restart otel agent
  shell: |
    launchctl bootout system/{{ otel_agent_label }} 2>/dev/null || true
    launchctl bootstrap system /Library/LaunchDaemons/{{ otel_agent_label }}.plist
  become: true
  ignore_errors: true   # macOS Tahoe returns I/O error but still restarts correctly

- name: restart apple exporter
  shell: |
    launchctl bootout system/{{ apple_exporter_label }} 2>/dev/null || true
    launchctl bootstrap system /Library/LaunchDaemons/{{ apple_exporter_label }}.plist
  become: true
  ignore_errors: true
