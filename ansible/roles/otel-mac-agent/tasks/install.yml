# ansible/roles/otel-mac-agent/tasks/install.yml
# Copies otelcol-contrib from local files/ to target and extracts binary.
# No internet access required on the target.
---

- name: Assert otelcol-contrib tarball exists in files/
  local_action:
    module: stat
    path: "{{ role_path }}/files/otelcol-contrib_darwin_arm64.tar.gz"
    checksum_algorithm: sha256
    get_checksum: true
  register: _otel_tarball
  run_once: true

- name: Fail with instructions if tarball is missing
  fail:
    msg: |
      Missing: {{ role_path }}/files/otelcol-contrib_darwin_arm64.tar.gz
      See ansible/roles/otel-mac-agent/files/README.md for download instructions.
  when: not _otel_tarball.stat.exists
  run_once: true

- name: Verify otelcol-contrib tarball sha256 against hydra_artifact_checksums (ANS-4)
  assert:
    that:
      - hydra_artifact_checksums['otel_agent']['darwin_arm64'] is defined
      - _otel_tarball.stat.checksum == hydra_artifact_checksums['otel_agent']['darwin_arm64']
    fail_msg: >-
      sha256 mismatch for otelcol-contrib_darwin_arm64.tar.gz:
      staged={{ _otel_tarball.stat.checksum | default('<missing>') }}
      expected={{ hydra_artifact_checksums['otel_agent']['darwin_arm64'] | default('<unpinned>') }}
  run_once: true

- name: Copy otelcol-contrib tarball to target (no internet needed)
  copy:
    src: otelcol-contrib_darwin_arm64.tar.gz
    dest: /tmp/otelcol-contrib_darwin_arm64.tar.gz
    mode: "0644"
  become: true

- name: Extract otelcol-contrib binary from tarball
  unarchive:
    src: /tmp/otelcol-contrib_darwin_arm64.tar.gz
    dest: /usr/local/bin
    remote_src: true
    creates: "{{ otel_binary_path }}"
    extra_opts: [--strip-components=0]
  become: true

- name: Ensure otelcol-contrib is executable
  file:
    path: "{{ otel_binary_path }}"
    mode: "0755"
  become: true

- name: Clean up tarball from /tmp
  file:
    path: /tmp/otelcol-contrib_darwin_arm64.tar.gz
    state: absent
  become: true

- name: Verify otelcol-contrib version
  command: "{{ otel_binary_path }} --version"
  register: _otel_ver
  changed_when: false

- name: Assert otelcol-contrib version matches the pin (ANS-4)
  assert:
    that: (hydra_versions.otel_agent | default(otel_version)) in _otel_ver.stdout
    fail_msg: >-
      otelcol-contrib reports '{{ _otel_ver.stdout | trim }}',
      expected pin {{ hydra_versions.otel_agent | default(otel_version) }}.

- name: Show otelcol-contrib version
  debug:
    msg: "{{ inventory_hostname }}: {{ _otel_ver.stdout | trim }}"
