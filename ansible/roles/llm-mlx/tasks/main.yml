# ansible/roles/llm-mlx/tasks/main.yml
# Deploys Apple MLX (mlx-lm) inference server — air-gapped, wheels from files/.
---

# ── Preflight ─────────────────────────────────────────────────────────────────

- name: Assert MLX wheels directory exists in files/
  delegate_to: localhost
  stat:
    path: "{{ role_path }}/files/wheels"
  register: _mlx_wheels_dir
  run_once: true
  when: not (mlx_use_jfrog | bool)

- name: Fail if MLX wheels are missing
  fail:
    msg: |
      Missing: {{ role_path }}/files/wheels/
      See ansible/roles/llm-mlx/files/README.md — download wheels on a Mac with internet and place here.
      pip download "mlx-lm==0.31.3" "mlx>=0.22.0" "huggingface-hub>=0.27.0" "transformers>=4.48.0" "sentencepiece>=0.2.0" "protobuf>=4.25.0" "numpy>=1.26.0,<2.3.0" \
        --platform macosx_14_0_arm64 --python-version 311 --only-binary=:all: -d files/wheels/
  when: not (mlx_use_jfrog | bool) and not _mlx_wheels_dir.stat.exists
  run_once: true

# ── Directories ───────────────────────────────────────────────────────────────

- name: Create MLX directory
  file:
    path: "{{ mlx_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Check MLX model directory exists
  stat:
    path: "{{ mlx_default_model }}"
  register: _mlx_model_dir

- name: Fail if MLX model directory is missing
  fail:
    msg: |
      MLX model not found at {{ mlx_default_model }}
      Place a quantized MLX model directory there before running this role.
      Example: rsync -av /path/to/model {{ mlx_models_dir }}/
  when: not _mlx_model_dir.stat.exists

# ── Virtualenv ────────────────────────────────────────────────────────────────
- name: Create MLX virtualenv
  command: >
    {{ homebrew_prefix }}/opt/python@{{ python_version }}/bin/python{{ python_version }}
    -m venv {{ mlx_venv }}
  args:
    creates: "{{ mlx_venv }}/bin/python"
  become: true

# ── Dependencies: JFrog Artifactory (primary) ─────────────────────────────────
- name: Install MLX packages from JFrog Artifactory
  pip:
    name: "{{ mlx_packages }}"
    virtualenv: "{{ mlx_venv }}"
    extra_args: "--index-url {{ jfrog_pypi_index }} --trusted-host {{ jfrog_pypi_trusted_host }}"
    state: present
  become: true
  when: mlx_use_jfrog | bool
  register: _mlx_pip_jfrog
  retries: 2
  delay: 5
  until: _mlx_pip_jfrog is succeeded

# ── Dependencies: vendored wheels (fallback for full air-gap) ─────────────────
- name: Sync MLX wheels (offline fallback)
  synchronize:
    src: "{{ role_path }}/files/wheels/"
    dest: "{{ mlx_dir }}/wheels/"
    delete: false
  become: true
  changed_when: false
  when: not (mlx_use_jfrog | bool)

- name: Install MLX packages from local wheels (offline fallback)
  pip:
    name: "{{ mlx_packages }}"
    virtualenv: "{{ mlx_venv }}"
    extra_args: "--no-index --find-links {{ mlx_dir }}/wheels"
    state: present
  become: true
  when: not (mlx_use_jfrog | bool)

# ── Backend-specific install ──────────────────────────────────────────────────

- name: Install vllm-mlx backend
  include_tasks: install_vllm_mlx.yml
  when: mlx_server_backend == 'vllm_mlx'

# ── LaunchDaemon ──────────────────────────────────────────────────────────────

- name: Install MLX server LaunchDaemon
  template:
    src: com.hydra.mlx-server.plist.j2
    dest: /Library/LaunchDaemons/com.hydra.mlx-server.plist
    owner: root
    group: wheel
    mode: "0644"
  become: true
  notify: restart mlx-server

- name: Bootstrap MLX server LaunchDaemon (first load)
  command: launchctl bootstrap system /Library/LaunchDaemons/com.hydra.mlx-server.plist
  become: true
  register: _mlx_boot
  changed_when: _mlx_boot.rc == 0
  ignore_errors: true

# ── Log exporter ──────────────────────────────────────────────────────────────
# LLM-5: for the pure-MLX backends (mlx_lm / mlx_lm_sidecar) the engine emits no
# throughput/TTFT/TPOT/KV metrics — only the crash counters from this log
# exporter. The perf sidecar that would emit those on mlx_metrics_port
# ({{ mlx_metrics_port }}) extends this exporter pattern; llm-discovery already
# carries `mlx` into discovered.yml so the unified OTEL agent scrapes it.
# TODO(LLM-5): owned by monitoring agent — the sidecar's metric emission logic
# (tokens/s, TTFT, KV occupancy vs mlx_max_kv_size) is exporter code in
# monitoring/ and out of scope for this ansible branch.

- name: Install prometheus-client for log exporter (JFrog)
  pip:
    name: ["prometheus-client>=0.20.0"]
    virtualenv: "{{ mlx_venv }}"
    extra_args: "--index-url {{ jfrog_pypi_index }} --trusted-host {{ jfrog_pypi_trusted_host }}"
  become: true
  when: mlx_use_jfrog | bool

- name: Install prometheus-client for log exporter (offline wheels fallback)
  pip:
    name: ["prometheus-client>=0.20.0"]
    virtualenv: "{{ mlx_venv }}"
    extra_args: "--no-index --find-links {{ mlx_dir }}/wheels"
  become: true
  when: not (mlx_use_jfrog | bool)

- name: Copy MLX log exporter
  copy:
    src: mlx_log_exporter.py
    dest: "{{ mlx_dir }}/mlx_log_exporter.py"
    mode: "0755"
  become: true
  notify: restart mlx-logexporter

- name: Install MLX log exporter LaunchDaemon
  template:
    src: com.hydra.mlx-logexporter.plist.j2
    dest: /Library/LaunchDaemons/com.hydra.mlx-logexporter.plist
    owner: root
    group: wheel
    mode: "0644"
  become: true
  notify: restart mlx-logexporter

- name: Flush handlers
  meta: flush_handlers

- name: Wait for MLX server to serve /v1/models
  uri:
    url: "http://localhost:{{ mlx_port }}/v1/models"
    status_code: 200
    timeout: 5
  register: _mlx_health
  until: _mlx_health.status == 200
  retries: 24
  delay: 10
