# ansible/roles/llm-mlx/vars/main.yml
---
mlx_dir: "{{ llm_base_dir }}/mlx"
mlx_venv: "{{ mlx_dir }}/venv"
mlx_port: 11500          # moved off 11434 (Ollama) — see Task 2
# LLM-5 perf sidecar /metrics for the pure-MLX (mlx_lm / mlx_lm_sidecar) backends,
# which otherwise expose only crash counters. vllm_mlx serves /metrics on mlx_port
# directly, so this sidecar port is used only when mlx_server_backend != vllm_mlx.
mlx_metrics_port: 11501
mlx_logexporter_port: 11502  # log exporter /metrics — must match mlx_logexporter_scrape_port in group_vars/all.yml
# NOTE: the dead `mlx_effective_metrics_port` indirection was removed (ANS-6);
# discovery now selects the scrape target via mlx_server_backend directly.
mlx_workers: 2
mlx_default_model: /opt/hydra/models/mlx/Mistral-7B-Instruct-v0.3-4bit
mlx_models_dir: /opt/hydra/models/mlx

# Backend selector: vllm_mlx (4A, default) | mlx_lm_sidecar (4B) | mlx_lm (4C)
# Sourced from the group-level hydra_mlx_backend so llm-discovery (which runs
# without this role loaded) and the role agree on whether the perf-proxy sidecar
# is active. Override hydra_mlx_backend per host/group in inventory.
mlx_server_backend: "{{ hydra_mlx_backend | default('vllm_mlx') }}"

# Perf-proxy sidecar (LLM-5): for the pure-MLX backends the engine emits no
# TTFT/throughput/KV metrics. When enabled the sidecar binds the public mlx_port
# and forwards to the engine on mlx_engine_bind_port (loopback), exposing mlx:*
# metrics on mlx_metrics_port.
mlx_sidecar_active: "{{ (mlx_server_backend != 'vllm_mlx') | bool }}"
mlx_engine_bind_host: "{{ '127.0.0.1' if mlx_sidecar_active | bool else '0.0.0.0' }}"
mlx_engine_bind_port: "{{ mlx_internal_port if mlx_sidecar_active | bool else mlx_port }}"
mlx_max_concurrency: 8

# Dependency delivery
mlx_use_jfrog: true
jfrog_pypi_index: "{{ jfrog.pypi_index }}"
jfrog_pypi_trusted_host: "{{ jfrog.pypi_trusted_host }}"

# Pinned latest — verify exact mlx pin against the JFrog index before commit
mlx_packages:
  - "mlx-lm==0.31.3"
  - "mlx>=0.22.0"
  - "huggingface-hub>=0.27.0"
  - "transformers>=4.48.0"
  - "sentencepiece>=0.2.0"
  - "protobuf>=4.25.0"
  - "numpy>=1.26.0,<2.3.0"

mlx_vllm_packages:
  - "vllm-mlx==0.4.0rc1"

mlx_telemetry_packages:
  - "llm-telemetry>=0.1.0"
  - "prometheus-client>=0.20.0"

# OOM guardrails (16 GB M4 — weight ceiling ~9.6 GB, KV budget 3.8–8 GB)
mlx_max_tokens: 2048          # default per-request output cap
mlx_max_kv_size: 4096         # rotating KV cache ceiling (tokens)
mlx_memory_limit_mb: 12000    # MLX wired-memory limit; abort-guard
