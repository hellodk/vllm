# ansible/roles/hw-exporter/tasks/main.yml
# Linux-only hardware exporters (ANS-1/-7). hw-exporter is gated to Linux in
# site.yml; macOS Apple Silicon nodes are owned by the dedicated
# `apple-silicon-exporter` role via mac-monitoring.yml.
---
- name: Deprecated Apple path — owned by apple-silicon-exporter role (ANS-7)
  include_tasks: apple.yml
  when: hydra_gpu_provider == "apple"

- name: Install dcgm-exporter (NVIDIA)
  include_tasks: nvidia.yml
  when: hydra_gpu_provider == "nvidia"

- name: Install amdgpu_exporter (AMD) — placeholder
  include_tasks: amd.yml
  when: hydra_gpu_provider == "amd"

- name: Install node_exporter (CPU-only or cpu_inference nodes)
  include_tasks: cpu.yml
  when: hydra_gpu_provider == "none" or hydra_cpu_inference | default(false)
