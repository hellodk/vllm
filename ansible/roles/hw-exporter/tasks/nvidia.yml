# ansible/roles/hw-exporter/tasks/nvidia.yml
---

# ── Runtime dependencies ───────────────────────────────────────────────────────
# Package installs require outbound apt access; skip in air-gapped environments
# where Docker and nvidia-container-toolkit must already be present on the host.

- name: Ensure Docker is installed (online)
  package:
    name: docker.io
    state: present
  become: true
  when: not hydra_airgapped | default(true)

- name: Ensure nvidia-container-toolkit is installed (online)
  package:
    name: nvidia-container-toolkit
    state: present
  become: true
  when: not hydra_airgapped | default(true)

- name: Configure Docker daemon for NVIDIA runtime
  command: nvidia-ctk runtime configure --runtime=docker
  become: true
  changed_when: false

- name: Ensure Docker service is running
  service:
    name: docker
    state: started
    enabled: true
  become: true

# ── dcgm-exporter image acquisition ───────────────────────────────────────────

- name: Pull dcgm-exporter image (online)
  community.docker.docker_image:
    name: "nvcr.io/nvidia/k8s/dcgm-exporter:{{ hydra_versions.dcgm_exporter }}-ubuntu22.04"
    source: pull
  become: true
  when: not hydra_airgapped | default(true)

- name: Check for pre-staged dcgm-exporter image tarball (air-gapped)
  local_action:
    module: stat
    path: "{{ role_path }}/files/dcgm-exporter-{{ hydra_versions.dcgm_exporter }}.tar"
    checksum_algorithm: sha256
    get_checksum: true
  register: _dcgm_image_tar

- name: Verify dcgm-exporter image tarball sha256 (air-gapped, ANS-4)
  assert:
    that:
      - hydra_artifact_checksums['dcgm_exporter']['tarball'] is defined
      - _dcgm_image_tar.stat.checksum == hydra_artifact_checksums['dcgm_exporter']['tarball']
    fail_msg: >-
      sha256 mismatch for dcgm-exporter-{{ hydra_versions.dcgm_exporter }}.tar:
      staged={{ _dcgm_image_tar.stat.checksum | default('<missing>') }}
      expected={{ hydra_artifact_checksums['dcgm_exporter']['tarball'] | default('<unpinned>') }}
  when: (hydra_airgapped | default(true)) and _dcgm_image_tar.stat.exists

- name: Fail if dcgm-exporter image tarball is missing (air-gapped)
  fail:
    msg: |
      Air-gapped install requires a pre-staged Docker image tarball:
        {{ role_path }}/files/dcgm-exporter-{{ hydra_versions.dcgm_exporter }}.tar

      On a machine with internet access and Docker, run:
        docker pull nvcr.io/nvidia/k8s/dcgm-exporter:{{ hydra_versions.dcgm_exporter }}-ubuntu22.04
        docker save nvcr.io/nvidia/k8s/dcgm-exporter:{{ hydra_versions.dcgm_exporter }}-ubuntu22.04 \
          -o ansible/roles/hw-exporter/files/dcgm-exporter-{{ hydra_versions.dcgm_exporter }}.tar

      Then transfer the file to the Ansible control node and re-run.
  when: (hydra_airgapped | default(true)) and not _dcgm_image_tar.stat.exists

- name: Copy dcgm-exporter image tarball to target (air-gapped)
  copy:
    src: "dcgm-exporter-{{ hydra_versions.dcgm_exporter }}.tar"
    dest: "/tmp/dcgm-exporter-{{ hydra_versions.dcgm_exporter }}.tar"
    mode: "0644"
  become: true
  when: hydra_airgapped | default(true)

- name: Load dcgm-exporter image from tarball (air-gapped)
  community.docker.docker_image:
    name: "nvcr.io/nvidia/k8s/dcgm-exporter:{{ hydra_versions.dcgm_exporter }}-ubuntu22.04"
    source: load
    load_path: "/tmp/dcgm-exporter-{{ hydra_versions.dcgm_exporter }}.tar"
  become: true
  when: hydra_airgapped | default(true)

- name: Clean up dcgm-exporter image tarball from /tmp (air-gapped)
  file:
    path: "/tmp/dcgm-exporter-{{ hydra_versions.dcgm_exporter }}.tar"
    state: absent
  become: true
  when: hydra_airgapped | default(true)

# ── Custom counter CSV (SRE-4) ─────────────────────────────────────────────────

- name: Create dcgm-exporter config directory on host
  file:
    path: /etc/dcgm-exporter
    state: directory
    mode: "0755"
  become: true

- name: Stage custom DCGM counter CSV (NVLink/PCIe/SM/DRAM profiling)
  copy:
    src: dcgm-metrics.csv
    dest: "{{ dcgm_custom_csv_host_path }}"
    mode: "0644"
  become: true
  notify: restart dcgm-exporter

# ── Service deployment ─────────────────────────────────────────────────────────

- name: Create dcgm-exporter systemd unit
  template:
    src: dcgm-exporter.service.j2
    dest: /etc/systemd/system/dcgm-exporter.service
    mode: "0644"
  become: true

- name: Enable and start dcgm-exporter
  systemd:
    name: dcgm-exporter
    state: started
    enabled: true
    daemon_reload: true
  become: true

- name: Verify dcgm-exporter is responding
  uri:
    url: "http://127.0.0.1:9400/metrics"
    return_content: false
    status_code: 200
  register: _dcgm_check
  until: _dcgm_check.status == 200
  retries: 6
  delay: 5
