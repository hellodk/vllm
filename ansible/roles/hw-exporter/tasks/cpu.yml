# ansible/roles/hw-exporter/tasks/cpu.yml
---

# ── node_exporter: air-gapped installation (pre-staged tarball) ───────────────
# Operator must pre-stage the tarball in ansible/roles/hw-exporter/files/.
# See ansible/roles/hw-exporter/files/README.md for download instructions.

- name: Set node_exporter tarball name (Linux x86_64)
  set_fact:
    node_exporter_tarball: "node_exporter-{{ hydra_versions.node_exporter }}.linux-amd64.tar.gz"
    node_exporter_dir: "node_exporter-{{ hydra_versions.node_exporter }}.linux-amd64"
  when: ansible_architecture == "x86_64"

- name: Set node_exporter tarball name (Linux aarch64)
  set_fact:
    node_exporter_tarball: "node_exporter-{{ hydra_versions.node_exporter }}.linux-arm64.tar.gz"
    node_exporter_dir: "node_exporter-{{ hydra_versions.node_exporter }}.linux-arm64"
  when: ansible_architecture in ["aarch64", "arm64"]

- name: Assert node_exporter tarball is pre-staged
  local_action:
    module: stat
    path: "{{ role_path }}/files/{{ node_exporter_tarball }}"
  register: _node_exporter_tarball_stat

- name: Fail if node_exporter tarball is missing
  fail:
    msg: |
      Missing pre-staged tarball: {{ role_path }}/files/{{ node_exporter_tarball }}
      Download from:
        https://github.com/prometheus/node_exporter/releases/tag/v{{ hydra_versions.node_exporter }}
      Place the tarball in ansible/roles/hw-exporter/files/ then re-run.
  when: not _node_exporter_tarball_stat.stat.exists

- name: Copy node_exporter tarball to target
  copy:
    src: "{{ node_exporter_tarball }}"
    dest: "/tmp/{{ node_exporter_tarball }}"
    mode: "0644"

- name: Extract node_exporter archive
  unarchive:
    src: "/tmp/{{ node_exporter_tarball }}"
    dest: /tmp/
    remote_src: true
    creates: "/tmp/{{ node_exporter_dir }}/node_exporter"

- name: Install node_exporter binary
  copy:
    src: "/tmp/{{ node_exporter_dir }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: true
  become: true

- name: Clean up node_exporter tarball and extracted directory from /tmp
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/{{ node_exporter_tarball }}"
    - "/tmp/{{ node_exporter_dir }}"

- name: Install node_exporter systemd unit
  template:
    src: node-exporter.service.j2
    dest: /etc/systemd/system/node-exporter.service
    mode: "0644"
  become: true

- name: Enable and start node_exporter
  systemd:
    name: node-exporter
    state: started
    enabled: true
    daemon_reload: true
  become: true

- name: Verify node_exporter is responding
  uri:
    url: "http://127.0.0.1:9100/metrics"
    return_content: false
    status_code: 200
  register: _node_exporter_check
  until: _node_exporter_check.status == 200
  retries: 6
  delay: 5
