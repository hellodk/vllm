# ansible/roles/hw-exporter/tasks/apple.yml
# DEPRECATED (ANS-1 / ANS-7). The build-from-source Apple exporter path that used
# to live here (Homebrew Go + go build + :9101 plist) has been removed: it
# required internet on the target (air-gap violation) and double-owned
# com.hydra.apple-exporter.plist with otel-mac-agent.
#
# Apple Silicon hardware metrics are now installed by the dedicated
# `apple-silicon-exporter` role (air-gapped, sha256-pinned binary) via
# ansible/mac-monitoring.yml. This file remains only to fail loudly if something
# still routes an Apple node through the Linux-only hw-exporter role.
---
- name: Refuse the deprecated hw-exporter Apple path
  ansible.builtin.fail:
    msg: |
      hw-exporter no longer provisions Apple Silicon nodes.
      Use ansible/mac-monitoring.yml, which runs the apple-silicon-exporter role.
      (hw-exporter is Linux-only — see docs/ansible-provisioning-strategy.md.)
