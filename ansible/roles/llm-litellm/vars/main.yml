# ansible/roles/llm-litellm/vars/main.yml
---
litellm_dir: /opt/hydra/litellm
litellm_venv: /opt/hydra/litellm/venv
litellm_port: 8080
litellm_master_key: sk-hydra-master-changeme   # rotate before prod
litellm_db_url: ""                              # optional: postgres for persistence
litellm_config: /opt/hydra/litellm/litellm_config.yml
litellm_packages:
  - "litellm[proxy]>=1.40.0"
  - "uvicorn[standard]==0.32.0"
  - "python-dotenv>=1.0.0"
  - "pydantic>=2.7.0"
  - "httpx>=0.27.0"
  - "redis>=5.0.0"    # optional caching; comment out if no Redis on GW nodes

# Pool → model → backend routing — mirrors cluster.yml pool layout
# Each entry in litellm_models becomes a "virtual model" that clients call by name.
litellm_models:
  # ── Fast pool: low-latency chat (10 nodes × 2 backends) ──────────────────
  - model_name: fast/mistral-7b
    litellm_params:
      model: openai/mistral-7b-instruct
      api_base: http://192.168.10.20:11434
      api_key: none
