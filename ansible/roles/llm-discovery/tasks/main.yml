# ansible/roles/llm-discovery/tasks/main.yml
# Registry-driven discovery (ANS-6). The llm_engine_catalog (group_vars) supplies
# port/scheme/health_path/metrics_path/auth per engine. Discovery either enriches
# the explicitly-configured hydra_llm_endpoints or auto-probes the catalog, then
# writes /etc/hydra/discovered.yml carrying metrics_path + scheme + bearer auth so
# the unified OTEL template can scrape each engine correctly (incl. SGLang — LLM-7).
---
- name: Initialise discovered provider list
  ansible.builtin.set_fact:
    _discovered_providers: []

# ── Path A: explicit endpoints from cluster.yml (enrich via catalog) ──────────
- name: Enrich each configured endpoint with catalog metadata
  vars:
    _cat: "{{ llm_engine_catalog[item.provider] | default({}) }}"
    _port: "{{ item.port | default(item.url | regex_search(':([0-9]+)', '\\1') | default(_cat.port | default('0'))) }}"
    _auth: "{{ _cat.auth | default('none') }}"
  ansible.builtin.set_fact:
    _discovered_providers: >-
      {{ _discovered_providers + [{
        'name': item.provider,
        'url': item.url | default((_cat.scheme | default('http')) ~ '://127.0.0.1:' ~ _port ~ '/v1'),
        'port': _port | string,
        'metrics_path': _cat.metrics_path | default('/metrics'),
        'scheme': _cat.scheme | default('http'),
        'api_key': (item.api_key if (item.api_key is defined and item.api_key) else
                    (vault_llm_provider_api_keys[item.provider] | default('') if _auth == 'bearer' else '')),
        'status': 'configured'
      }] }}
  loop: "{{ hydra_llm_endpoints | default([]) }}"
  loop_control:
    label: "{{ item.provider }}"
  when: (hydra_llm_endpoints | default([])) | length > 0

# ── Path B: no explicit endpoints → auto-probe the catalog ────────────────────
- name: Auto-probe catalog engines (health check)
  ansible.builtin.uri:
    url: "{{ item.value.scheme | default('http') }}://127.0.0.1:{{ item.value.port }}{{ item.value.health_path | default('/health') }}"
    status_code: [200, 404, 405]
    timeout: 2
  register: _probe_result
  ignore_errors: true
  loop: "{{ llm_engine_catalog | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: (hydra_llm_endpoints | default([])) | length == 0

- name: Build discovered list from successful probes
  vars:
    _cat: "{{ item.item.value }}"
    _prov: "{{ item.item.key }}"
    _auth: "{{ _cat.auth | default('none') }}"
  ansible.builtin.set_fact:
    _discovered_providers: >-
      {{ _discovered_providers + [{
        'name': _prov,
        'url': (_cat.scheme | default('http')) ~ '://127.0.0.1:' ~ _cat.port ~ '/v1',
        'port': _cat.port | string,
        'metrics_path': _cat.metrics_path | default('/metrics'),
        'scheme': _cat.scheme | default('http'),
        'api_key': (vault_llm_provider_api_keys[_prov] | default('') if _auth == 'bearer' else ''),
        'status': 'up'
      }] }}
  loop: "{{ _probe_result.results | default([]) }}"
  loop_control:
    label: "{{ item.item.key | default('?') }}"
  when:
    - (hydra_llm_endpoints | default([])) | length == 0
    - not (item.failed | default(true))
    - (item.status | default(0)) in [200, 404, 405]

# ── MLX presence signal (works under both inventories) ────────────────────────
# Static inventories/llm/hosts.yml sets `llm_frameworks` per pool; dynamic
# cluster.yml sets hydra_llm_endpoints (an MLX node declares a vllm-mlx endpoint).
- name: Determine whether MLX runs on this node
  ansible.builtin.set_fact:
    _mlx_on_node: >-
      {{ ('mlx' in (llm_frameworks | default([])))
         or ((hydra_llm_endpoints | default([]))
             | selectattr('provider', 'equalto', 'vllm-mlx') | list | length > 0) }}

- name: Add MLX /metrics endpoint (vllm_mlx — native vllm:* on the serving port)
  vars:
    _cat: "{{ llm_engine_catalog['mlx'] | default({}) }}"
  ansible.builtin.set_fact:
    _discovered_providers: >-
      {{ _discovered_providers + [{
        'name': 'mlx',
        'url': 'http://127.0.0.1:' ~ mlx_scrape_port ~ '/v1',
        'port': mlx_scrape_port | string,
        'metrics_path': _cat.metrics_path | default('/metrics'),
        'scheme': _cat.scheme | default('http'),
        'api_key': '',
        'status': 'up'
      }] }}
  when: _mlx_on_node | bool and not (mlx_sidecar_enabled | bool)

- name: Add MLX perf-proxy /metrics endpoint (pure-MLX sidecar — mlx:* metrics)
  ansible.builtin.set_fact:
    _discovered_providers: >-
      {{ _discovered_providers + [{
        'name': 'mlx_perf',
        'url': 'http://127.0.0.1:' ~ mlx_perf_scrape_port ~ '/metrics',
        'port': mlx_perf_scrape_port | string,
        'metrics_path': '/metrics',
        'scheme': 'http',
        'api_key': '',
        'status': 'up'
      }] }}
  when: _mlx_on_node | bool and (mlx_sidecar_enabled | bool)

# ── exo distributed inference perf-proxy ─────────────────────────────────────
- name: Determine whether exo runs on this node
  ansible.builtin.set_fact:
    _exo_on_node: "{{ 'exo' in (llm_frameworks | default([])) }}"

- name: Add exo perf-proxy /metrics endpoint (when exo deployed on this node)
  ansible.builtin.set_fact:
    _discovered_providers: >-
      {{ _discovered_providers + [{
        'name': 'exo',
        'url': 'http://127.0.0.1:' ~ exo_perf_scrape_port ~ '/metrics',
        'port': exo_perf_scrape_port | string,
        'metrics_path': '/metrics',
        'scheme': 'http',
        'api_key': '',
        'status': 'up'
      }] }}
  when: _exo_on_node | bool and (exo_sidecar_enabled | bool)

# ── Apple AllReduce fabric probe (tensor-parallel group leaders) ─────────────
- name: Add MLX AllReduce fabric /metrics endpoint (tensor-parallel leaders)
  ansible.builtin.set_fact:
    _discovered_providers: >-
      {{ _discovered_providers + [{
        'name': 'mlx_fabric',
        'url': 'http://127.0.0.1:' ~ mlx_allreduce_fabric_scrape_port ~ '/metrics',
        'port': mlx_allreduce_fabric_scrape_port | string,
        'metrics_path': '/metrics',
        'scheme': 'http',
        'api_key': '',
        'status': 'up'
      }] }}
  when: mlx_allreduce_enabled | default(false) | bool

- name: Add MLX log-exporter /metrics endpoint (when MLX deployed on this node)
  ansible.builtin.set_fact:
    _discovered_providers: >-
      {{ _discovered_providers + [{
        'name': 'mlx_errors',
        'url': 'http://127.0.0.1:' ~ mlx_logexporter_scrape_port ~ '/metrics',
        'port': mlx_logexporter_scrape_port | string,
        'metrics_path': '/metrics',
        'scheme': 'http',
        'api_key': '',
        'status': 'up'
      }] }}
  when: _mlx_on_node | bool

# ── Write /etc/hydra/discovered.yml (0640 — may carry bearer tokens) ──────────
- name: Write /etc/hydra/discovered.yml
  ansible.builtin.template:
    src: discovered.yml.j2
    dest: /etc/hydra/discovered.yml
    mode: "0640"
  become: true
