# ansible/roles/llm-discovery/tasks/main.yml
---
# Step A: Build endpoint list — use cluster.yml config or auto-probe
- name: Use explicitly configured endpoints from cluster.yml
  set_fact:
    _endpoints_to_probe: "{{ hydra_llm_endpoints }}"
  when: hydra_llm_endpoints | length > 0

- name: Initialise empty probe list (no endpoints configured)
  set_fact:
    _endpoints_to_probe: []
    _probe_result: { results: [] }
  when: hydra_llm_endpoints | length == 0

- name: Probe default port {{ item.key }} for provider {{ item.value }}
  uri:
    url: "http://127.0.0.1:{{ item.key }}/health"
    status_code: [200, 404, 405]
    timeout: 2
  register: _probe_result
  ignore_errors: true
  loop: "{{ llm_probe_ports | dict2items }}"
  when: hydra_llm_endpoints | length == 0

- name: Build discovered endpoint list from successful probes
  set_fact:
    _endpoints_to_probe: >-
      {{ _endpoints_to_probe + [{'provider': item.item.value,
         'url': 'http://127.0.0.1:' + item.item.key | string + '/v1',
         'port': item.item.key | string,
         'api_key': none}] }}
  loop: "{{ _probe_result.results | default([]) }}"
  when:
    - hydra_llm_endpoints | length == 0
    - not item.failed | default(true)
    - item.status | default(0) in [200, 404, 405]

# MLX-presence signal. Works under BOTH inventories:
#   - static inventories/llm/hosts.yml sets `llm_frameworks` per pool (deployment view)
#   - dynamic cluster.yml (inventory_plugin.py) sets `hydra_llm_endpoints` (runtime view);
#     an MLX node is one declaring a `vllm-mlx` endpoint there.
# Both source vars are guarded with default([]) since each only exists under one inventory.
- name: Determine whether MLX runs on this node
  set_fact:
    _mlx_on_node: >-
      {{ ('mlx' in (llm_frameworks | default([])))
         or (hydra_llm_endpoints | default([])
             | selectattr('provider', 'equalto', 'vllm-mlx') | list | length > 0) }}

- name: Add MLX /metrics endpoint to discovery (when MLX deployed on this node)
  set_fact:
    _endpoints_to_probe: >-
      {{ _endpoints_to_probe + [{'provider': 'mlx',
         'url': 'http://127.0.0.1:' + mlx_scrape_port | string + '/v1',
         'port': mlx_scrape_port | string,
         'api_key': none}] }}
  when: _mlx_on_node | bool

- name: Add MLX log-exporter /metrics endpoint to discovery (when MLX deployed on this node)
  set_fact:
    _endpoints_to_probe: >-
      {{ _endpoints_to_probe + [{'provider': 'mlx_errors',
         'url': 'http://127.0.0.1:' + mlx_logexporter_scrape_port | string + '/metrics',
         'port': mlx_logexporter_scrape_port | string,
         'api_key': none}] }}
  when: _mlx_on_node | bool

# Step B: Write /etc/hydra/discovered.yml
- name: Write /etc/hydra/discovered.yml
  template:
    src: discovered.yml.j2
    dest: /etc/hydra/discovered.yml
    mode: "0644"
  become: true
