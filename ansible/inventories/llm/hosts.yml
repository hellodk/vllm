# ansible/inventories/llm/hosts.yml
# LLM framework inventory — edit IPs, SSH key path, and per-host llm_frameworks list.
# llm_frameworks controls which roles are applied (see ansible/llm-frameworks.yml).
---
all:
  vars:
    ansible_user: admin
    ansible_ssh_private_key_file: ~/.ssh/hydra_ed25519
    ansible_python_interpreter: /usr/bin/python3
    python_version: "3.11"
    llm_base_dir: /opt/hydra/llm

  children:

    # ── Fast pool: low-latency chat (10 nodes) ──────────────────────────────────
    fast_pool:
      vars:
        pool: fast
        llm_frameworks:
          - mlx
          - vllm
      hosts:
        hydra-fast-01: { ansible_host: 192.168.10.20 }
        hydra-fast-02: { ansible_host: 192.168.10.21 }
        hydra-fast-03: { ansible_host: 192.168.10.22 }
        hydra-fast-04: { ansible_host: 192.168.10.23 }
        hydra-fast-05: { ansible_host: 192.168.10.24 }
        hydra-fast-06: { ansible_host: 192.168.10.25 }
        hydra-fast-07: { ansible_host: 192.168.10.26 }
        hydra-fast-08: { ansible_host: 192.168.10.27 }
        hydra-fast-09: { ansible_host: 192.168.10.28 }
        hydra-fast-10: { ansible_host: 192.168.10.29 }

    # ── Reason pool: CoT / long-context (4 nodes) ──────────────────────────────
    reason_pool:
      vars:
        pool: reason
        llm_frameworks:
          - mlx
          - vllm
      hosts:
        hydra-reason-01: { ansible_host: 192.168.10.30 }
        hydra-reason-02: { ansible_host: 192.168.10.31 }
        hydra-reason-03: { ansible_host: 192.168.10.32 }
        hydra-reason-04: { ansible_host: 192.168.10.33 }

    # ── Large pool: tensor-parallel pairs via RDMA (4 nodes, 2 pairs) ──────────
    large_pool:
      vars:
        pool: largepool
        llm_frameworks:
          - exo
          - mlx
        # Pair A: large-01 + large-02 (RDMA peer discovery)
        # Pair B: large-03 + large-04
      hosts:
        hydra-large-01:
          ansible_host: 192.168.10.40
          exo_peers: ["192.168.10.41"]
        hydra-large-02:
          ansible_host: 192.168.10.41
          exo_peers: ["192.168.10.40"]
        hydra-large-03:
          ansible_host: 192.168.10.42
          exo_peers: ["192.168.10.43"]
        hydra-large-04:
          ansible_host: 192.168.10.43
          exo_peers: ["192.168.10.42"]

    # ── Vision pool (3 nodes) ───────────────────────────────────────────────────
    vision_pool:
      vars:
        pool: vision
        llm_frameworks:
          - mlx
      hosts:
        hydra-vision-01: { ansible_host: 192.168.10.50 }
        hydra-vision-02: { ansible_host: 192.168.10.51 }
        hydra-vision-03: { ansible_host: 192.168.10.52 }

    # ── Embed pool (2 nodes) ────────────────────────────────────────────────────
    embed_pool:
      vars:
        pool: embed
        llm_frameworks:
          - mlx
      hosts:
        hydra-embed-01: { ansible_host: 192.168.10.60 }
        hydra-embed-02: { ansible_host: 192.168.10.61 }

    # ── Speech pool (1 node) ────────────────────────────────────────────────────
    speech_pool:
      vars:
        pool: speech
        llm_frameworks:
          - mlx
      hosts:
        hydra-speech-01: { ansible_host: 192.168.10.70 }

    # ── Gateway nodes: LiteLLM proxy (hydra-gw-01/02) ─────────────────────────
    gateway:
      vars:
        pool: gateway
        llm_frameworks: []   # gateways run litellm, not inference backends
        litellm_master_key: sk-hydra-master-changeme   # override in host_vars for prod
      hosts:
        hydra-gw-01: { ansible_host: 192.168.10.10 }
        hydra-gw-02: { ansible_host: 192.168.10.11 }

    # ── Experimental: BitNet + AirLLM testing ──────────────────────────────────
    experimental:
      vars:
        pool: fast
        llm_frameworks:
          - bitnet
          - airllm
      hosts:
        hydra-fast-01: {}   # reuse fast-01 for experiments; override llm_frameworks per host if needed
