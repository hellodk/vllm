# ansible/group_vars/all.yml

# ── Exporter listen ports ─────────────────────────────────────────────────────
# Fixed — do not change without updating dashboard queries
hw_exporter_ports:
  apple: 9101
  nvidia: 9400
  amd: 9102
  none: 9100

# ── LLM engine catalog (ANS-6) ───────────────────────────────────────────────
# Registry that drives BOTH discovery probes and OTEL scrape jobs. Replaces the
# fixed 4-port probe map. Each engine declares how to reach it (port/scheme),
# how to health-check it (health_path), where its Prometheus metrics live
# (metrics_path) and how to authenticate (auth: none|bearer). Bearer tokens are
# resolved from vault_llm_provider_api_keys[<provider>] at discovery time.
llm_engine_catalog:
  ollama:    {port: 11434, scheme: http, health_path: "/",            metrics_path: "/metrics", auth: none}
  llamacpp:  {port: 21434, scheme: http, health_path: "/health",      metrics_path: "/metrics", auth: none}
  vllm:      {port: 8000,  scheme: http, health_path: "/health",      metrics_path: "/metrics", auth: none}
  vllm-mlx:  {port: 11500, scheme: http, health_path: "/health",      metrics_path: "/metrics", auth: none}
  mlx:       {port: 11500, scheme: http, health_path: "/v1/models",   metrics_path: "/metrics", auth: none}
  sglang:    {port: 30000, scheme: http, health_path: "/health",      metrics_path: "/metrics", auth: none}
  litellm:   {port: 8080,  scheme: http, health_path: "/health/liveliness", metrics_path: "/metrics", auth: bearer}
  # exo P2P distributed inference (large_pool). exo's API exposes no Prometheus
  # metrics, so the llm-exo role fronts it with the shared perf-proxy and the
  # /metrics here points at that sidecar's port (exo_perf_scrape_port), not the API.
  exo:       {port: "{{ exo_perf_scrape_port | default(52417) }}", scheme: http, health_path: "/metrics", metrics_path: "/metrics", auth: none}
  # mlx perf-proxy sidecar for the pure-MLX path (mlx_lm). vllm-mlx serves vllm:*
  # natively on mlx_scrape_port; pure mlx_lm has no metrics so the sidecar emits mlx:*.
  mlx_perf:  {port: "{{ mlx_perf_scrape_port | default(11501) }}", scheme: http, health_path: "/metrics", metrics_path: "/metrics", auth: none}

# ── Engine OTLP trace export (LLM-6) ─────────────────────────────────────────
# Engines push spans to the LOCAL OTEL agent, which forwards them to the gateway
# (the unified template now has a traces pipeline). Keep these pointed at the
# loopback agent ports, not the remote gateway.
otel_traces_grpc_endpoint: "127.0.0.1:4317"
otel_traces_http_endpoint: "http://127.0.0.1:4318"

# MLX /metrics scrape target. vllm-mlx serves /metrics on its main serving port (mlx_port=11500).
# Kept here (not only in the llm-mlx role) so llm-discovery — which runs in site.yml without the
# llm-mlx role loaded — can reference it without an undefined-variable error.
mlx_scrape_port: 11500
# Log-exporter scrape port — must stay equal to mlx_logexporter_port in llm-mlx/vars/main.yml.
# Defined here so llm-discovery (site.yml, no llm-mlx role loaded) can reference it safely.
mlx_logexporter_scrape_port: 11502

# ── MLX backend selector + perf-proxy sidecar (single source of truth) ───────
# Drives BOTH the llm-mlx role and llm-discovery (which runs without the role
# loaded). Flip per host/group in inventory: set `hydra_mlx_backend: mlx_lm` on
# nodes that run pure mlx_lm.server (e.g. an experiment box) to enable the
# perf-proxy sidecar; leave at vllm_mlx for the production fleet (native vllm:*).
hydra_mlx_backend: vllm_mlx                                   # vllm_mlx | mlx_lm | mlx_lm_sidecar
mlx_sidecar_enabled: "{{ hydra_mlx_backend != 'vllm_mlx' }}"  # proxy fronts pure-MLX
mlx_perf_scrape_port: 11501   # sidecar /metrics (== mlx_metrics_port in llm-mlx vars)
mlx_internal_port: 11510      # engine loopback bind when the sidecar fronts it

# ── perf-proxy quality + tracing layers (shared by mlx + exo sidecars) ───────
# quality: scores each response for hallucination/quality signals (llm_* metrics)
#   that light up the hallucination-detection alert suite. Scores only — the proxy
#   never logs raw response text. entropy/perplexity/confidence need the client to
#   request logprobs; repetition/refusal/hedging are always available.
# tracing: emits one OTLP/HTTP span per request to the local OTEL agent so the
#   existing Tempo pipeline finally has a source.
llm_quality_enabled: true
llm_traces_enabled: true
llm_otlp_traces_endpoint: "http://127.0.0.1:{{ mc_http_port | default(4318) }}"

# ── exo perf-proxy sidecar ports ─────────────────────────────────────────────
# exo's API has no Prometheus metrics; the llm-exo role fronts it with the shared
# perf-proxy. exo_sidecar_enabled defaults on wherever exo runs.
exo_sidecar_enabled: true
exo_perf_scrape_port: 52417   # sidecar /metrics
exo_internal_api_port: 52426  # exo API loopback bind behind the sidecar

# ── Apple distributed AllReduce probe (SRE-4 Apple counterpart to nccl-probe) ──
# A periodic mlx.core.distributed all_sum benchmark across each tensor_parallel
# group, exposed via a textfile exporter the OTEL agent scrapes.
mlx_allreduce_enabled: false           # enable on tensor_parallel_groups leaders
mlx_allreduce_fabric_scrape_port: 11503
mlx_allreduce_size_mb: 256             # payload per all_sum iteration
mlx_allreduce_iters: 20
mlx_allreduce_interval_sec: 60

# ── JFrog Artifactory (on-prem PyPI mirror) ──────────────────────────────────
# Source of truth is cluster.yml, but that file is only read by inventory_plugin.py
# (which never surfaces `jfrog`). The llm-mlx role's vars reference `jfrog.pypi_index`,
# so it must live in group_vars to resolve under BOTH the static llm inventory and the
# dynamic site.yml inventory. Keep in sync with cluster.yml:jfrog.
jfrog:
  pypi_index: "https://artifactory.hydra.local/artifactory/api/pypi/pypi-remote/simple"
  pypi_trusted_host: "artifactory.hydra.local"
  token: "{{ vault_jfrog_token }}"   # ansible-vault — group_vars/all/vault.yml (ANS-5)

# ── Air-gap flag ─────────────────────────────────────────────────────────────
# Set false only in dev/lab environments that have internet access on targets.
# When true (default), all binary installs must use pre-staged files in each
# role's files/ directory — no outbound fetches are issued.
hydra_airgapped: true

# ── Offline binary directory ──────────────────────────────────────────────────
# NO internet access on targets — all binaries pre-staged here by operator.
# See ansible/roles/otel-mac-agent/files/README.md and
#     ansible/roles/model-registry/files/README.md for download instructions.
offline_bin_dir: "{{ playbook_dir }}/roles/otel-mac-agent/files"

# ── Version defaults ──────────────────────────────────────────────────────────
# Source of truth is cluster.yml:versions, surfaced as hydra_versions per-host
# by inventory_plugin.py.  This block covers the static LLM inventory path
# where inventory_plugin.py is not loaded (group_vars are the only source).
# Keep in sync with cluster.yml:cluster.versions.
hydra_versions:
  otel_agent: "0.96.0"
  apple_silicon_exporter: "1.0.0"
  node_exporter: "1.8.1"
  dcgm_exporter: "3.3.5-3.4.0"

# ── Binary download base URLs ─────────────────────────────────────────────────
# Consulted only when hydra_airgapped: false (dev/lab).
# In production the air-gapped paths in each role's tasks use pre-staged files.
otel_agent_download_base: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download"
node_exporter_download_base: "https://github.com/prometheus/node_exporter/releases/download"

# ── Allowed enum values ───────────────────────────────────────────────────────
valid_os: [macos, linux]
valid_gpu_providers: [apple, nvidia, amd, none]
valid_llm_providers: [llamacpp, ollama, vllm, vllm-mlx, mlx, sglang, litellm, exo]
valid_pools: [fast, reason, largepool, vision, embed, speech, gateway, infra]

# ── Hydra directories created on every node ──────────────────────────────────
hydra_dirs:
  linux:
    - /etc/hydra
    - /var/lib/hydra
    - /usr/local/bin
  macos:
    - /Library/Application Support/Hydra
    - /etc/hydra

# ── 10 GbE network tuning ────────────────────────────────────────────────────
network_interface: en0
network_mtu: 9000              # jumbo frames — must be enabled on switch too
network_rdma_mode: "RoCE-v2"  # RDMA over Converged Ethernet v2
network_pfc_enabled: true      # Priority Flow Control (lossless Ethernet for RDMA)
network_subnet: "192.168.10.0/24"

# ── Internal services (air-gapped) ───────────────────────────────────────────
ntp_server: "192.168.10.13"    # hydra-svc-01 acts as NTP stratum 1
dns_server: "192.168.10.10"    # hydra-gw-01 runs dnsmasq
dns_domain: "hydra.local"

# ── LiteLLM proxy (ANS-9: single source of truth for the port) ───────────────
# Canonical LiteLLM listen port. llm-litellm/vars/main.yml and llm_engine_catalog
# must both resolve to this; cluster.yml gateway role_notes reference it too.
litellm_port: 8080

# ── Model registry ───────────────────────────────────────────────────────────
model_registry_port: 8100
minio_port: 9000
minio_console_port: 9001

# ── LargePool distributed inference (2×2 tensor-parallel via RDMA) ───────────
# Group A: hydra-large-01 (192.168.10.40) ↔ hydra-large-02 (192.168.10.41)
# Group B: hydra-large-03 (192.168.10.42) ↔ hydra-large-04 (192.168.10.43)
tensor_parallel_groups:
  A: [hydra-large-01, hydra-large-02]
  B: [hydra-large-03, hydra-large-04]
tensor_parallel_model: "Qwen2.5-32B-Instruct-Q4_K_M"   # ~20 GB, fits 2×10 GB
tensor_parallel_runtime: "vllm-multinode"                # or: exo

# ── Per-node local model cache ────────────────────────────────────────────────
# 10 GbE: 5 GB (8B) in ~4s; 20 GB (32B) in ~16s from MinIO — pull on first load
local_model_cache_dir: "/Users/dk/models"
model_store_url: "http://192.168.10.12:9000"             # hydra-store-01 MinIO
