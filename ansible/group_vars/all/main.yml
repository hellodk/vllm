# ansible/group_vars/all.yml

# ── Exporter listen ports ─────────────────────────────────────────────────────
# Fixed — do not change without updating dashboard queries
hw_exporter_ports:
  apple: 9101
  nvidia: 9400
  amd: 9102
  none: 9100

# ── Default LLM provider probe ports ─────────────────────────────────────────
llm_probe_ports:
  11434: ollama
  21434: llamacpp
  8000: vllm-mlx
  8080: litellm

# MLX /metrics scrape target. vllm-mlx serves /metrics on its main serving port (mlx_port=11500).
# Kept here (not only in the llm-mlx role) so llm-discovery — which runs in site.yml without the
# llm-mlx role loaded — can reference it without an undefined-variable error.
mlx_scrape_port: 11500
# Log-exporter scrape port — must stay equal to mlx_logexporter_port in llm-mlx/vars/main.yml.
# Defined here so llm-discovery (site.yml, no llm-mlx role loaded) can reference it safely.
mlx_logexporter_scrape_port: 11502

# ── JFrog Artifactory (on-prem PyPI mirror) ──────────────────────────────────
# Source of truth is cluster.yml, but that file is only read by inventory_plugin.py
# (which never surfaces `jfrog`). The llm-mlx role's vars reference `jfrog.pypi_index`,
# so it must live in group_vars to resolve under BOTH the static llm inventory and the
# dynamic site.yml inventory. Keep in sync with cluster.yml:jfrog.
jfrog:
  pypi_index: "https://artifactory.hydra.local/artifactory/api/pypi/pypi-remote/simple"
  pypi_trusted_host: "artifactory.hydra.local"

# ── Air-gap flag ─────────────────────────────────────────────────────────────
# Set false only in dev/lab environments that have internet access on targets.
# When true (default), all binary installs must use pre-staged files in each
# role's files/ directory — no outbound fetches are issued.
hydra_airgapped: true

# ── Offline binary directory ──────────────────────────────────────────────────
# NO internet access on targets — all binaries pre-staged here by operator.
# See ansible/roles/otel-mac-agent/files/README.md and
#     ansible/roles/model-registry/files/README.md for download instructions.
offline_bin_dir: "{{ playbook_dir }}/roles/otel-mac-agent/files"

# ── Version defaults ──────────────────────────────────────────────────────────
# Source of truth is cluster.yml:versions, surfaced as hydra_versions per-host
# by inventory_plugin.py.  This block covers the static LLM inventory path
# where inventory_plugin.py is not loaded (group_vars are the only source).
# Keep in sync with cluster.yml:cluster.versions.
hydra_versions:
  otel_agent: "0.96.0"
  apple_silicon_exporter: "1.0.0"
  node_exporter: "1.8.1"
  dcgm_exporter: "3.3.5-3.4.0"

# ── Binary download base URLs ─────────────────────────────────────────────────
# Consulted only when hydra_airgapped: false (dev/lab).
# In production the air-gapped paths in each role's tasks use pre-staged files.
otel_agent_download_base: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download"
node_exporter_download_base: "https://github.com/prometheus/node_exporter/releases/download"

# ── Allowed enum values ───────────────────────────────────────────────────────
valid_os: [macos, linux]
valid_gpu_providers: [apple, nvidia, amd, none]
valid_llm_providers: [llamacpp, ollama, vllm-mlx, litellm]
valid_pools: [fast, reason, largepool, vision, embed, speech, gateway, infra]

# ── Hydra directories created on every node ──────────────────────────────────
hydra_dirs:
  linux:
    - /etc/hydra
    - /var/lib/hydra
    - /usr/local/bin
  macos:
    - /Library/Application Support/Hydra
    - /etc/hydra

# ── 10 GbE network tuning ────────────────────────────────────────────────────
network_interface: en0
network_mtu: 9000              # jumbo frames — must be enabled on switch too
network_rdma_mode: "RoCE-v2"  # RDMA over Converged Ethernet v2
network_pfc_enabled: true      # Priority Flow Control (lossless Ethernet for RDMA)
network_subnet: "192.168.10.0/24"

# ── Internal services (air-gapped) ───────────────────────────────────────────
ntp_server: "192.168.10.13"    # hydra-svc-01 acts as NTP stratum 1
dns_server: "192.168.10.10"    # hydra-gw-01 runs dnsmasq
dns_domain: "hydra.local"

# ── Model registry ───────────────────────────────────────────────────────────
model_registry_port: 8100
minio_port: 9000
minio_console_port: 9001

# ── LargePool distributed inference (2×2 tensor-parallel via RDMA) ───────────
# Group A: hydra-large-01 (192.168.10.40) ↔ hydra-large-02 (192.168.10.41)
# Group B: hydra-large-03 (192.168.10.42) ↔ hydra-large-04 (192.168.10.43)
tensor_parallel_groups:
  A: [hydra-large-01, hydra-large-02]
  B: [hydra-large-03, hydra-large-04]
tensor_parallel_model: "Qwen2.5-32B-Instruct-Q4_K_M"   # ~20 GB, fits 2×10 GB
tensor_parallel_runtime: "vllm-multinode"                # or: exo

# ── Per-node local model cache ────────────────────────────────────────────────
# 10 GbE: 5 GB (8B) in ~4s; 20 GB (32B) in ~16s from MinIO — pull on first load
local_model_cache_dir: "/Users/dk/models"
model_store_url: "http://192.168.10.12:9000"             # hydra-store-01 MinIO
