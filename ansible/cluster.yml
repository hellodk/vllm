# ansible/cluster.yml
cluster:
  name: hydra-prod
  environment: production
  otel_gateway:
    primary: "192.168.10.13:4317"    # hydra-svc-01
    secondary: ""
  prometheus_url: "http://192.168.10.13:9090"
  models_dir: "/Users/dk/models"
  versions:
    otel_agent: "0.96.0"
    apple_silicon_exporter: "1.0.0"

  # ── Network (10 GbE + RDMA) ────────────────────────────────────────────────
  network:
    speed: "10GbE"
    rdma: true
    rdma_mode: "RoCE-v2"           # RDMA over Converged Ethernet v2
    interface: "en0"
    mtu: 9000                       # jumbo frames — set on switch and all nodes
    subnet: "192.168.10.0/24"
    ntp_server: "192.168.10.13"     # hydra-svc-01 acts as internal NTP stratum
    dns_server: "192.168.10.10"     # hydra-gw-01 runs dnsmasq (hydra.local)
    dns_domain: "hydra.local"

  # ── Model registry (air-gapped — no internet) ─────────────────────────────
  model_registry:
    url: "http://192.168.10.12:8100"
    minio_url: "http://192.168.10.12:9000"
    minio_bucket: "hydra-models"
    minio_access_key: "hydra-admin"
    minio_secret_key: "changeme-v2"   # override before production use

# ── JFrog Artifactory (on-prem package mirror) ───────────────────────────────
jfrog:
  pypi_index: "https://artifactory.hydra.local/artifactory/api/pypi/pypi-remote/simple"
  pypi_trusted_host: "artifactory.hydra.local"
  # TODO v2: move token to vault
  token: "changeme-jfrog-token"

# ── OTEL monitoring fan-out destinations ─────────────────────────────────────
# Used by ansible/mac-monitoring.yml (otel-mac-agent role)
# Binaries must be pre-staged locally — NO internet on targets.
# See ansible/roles/otel-mac-agent/files/README.md
monitoring:
  collection_interval: "30s"
  victoria_metrics_url: "http://192.168.10.13:8428"   # hydra-svc-01
  otel_gateway_endpoint: "192.168.10.13:4317"
  fleet_platform_otlp: "http://192.168.10.13:8000/otlp"
  # salt.minion_id = node_id — join key for Fleet Platform data in Grafana

# ── Jenkins iOS build agent configuration ────────────────────────────────────
jenkins:
  host: "http://192.168.1.1:30881"     # Jenkins controller URL (k8s NodePort or direct)
  agent_name: "mobileapp-m3"           # node name as created in Jenkins UI
  user: dk                             # local macOS user owning the agent process
  executors: 2                         # executors configured in Jenkins UI
  pulse_repo_dir: "/Users/dk/pulse"    # path to cloned pulse/jenkins-k8s repo on agent

# ── SaltStack + Fleet Platform configuration ──────────────────────────────────
salt:
  master:
    id: fleet-control                        # ansible inventory hostname for the control plane
    hostname: fleet-control
    ip: 192.168.10.13                        # hydra-svc-01 — Salt Master co-located on services node
    user: dk
    ssh_port: 22
    become: true
    become_method: sudo
    os: linux                                # linux | macos
    kri_app_dir: "/home/dk/Documents/git/kri"
    kri_venv_dir: "/home/dk/Documents/git/kri/.venv"
    kri_user: dk
  config:
    fleet_api_url: "http://192.168.10.13:8000"
    fleet_admin_email: "admin@fleet.local"
    fleet_admin_password: "changeme123"      # plain text v1 — move to vault in v2
    auto_accept_keys: true
    sbom_schedule_time: "02:00am"
    sbom_scan_timeout: 600
    log_level: info

# ── Production cluster: 28 × Mac Mini M4 16 GB — 10 GbE + RDMA ───────────────
# Pool allocation: 2 gw + 1 store + 1 svc + 10 fast + 4 reason + 4 large + 3 vision + 2 embed + 1 speech
# Subnet: 192.168.10.0/24 · MTU 9000 (jumbo frames) · domain: hydra.local
production_nodes:

  # ── Infrastructure (non-inference) ──────────────────────────────────────────
  - &m4_defaults
    user: dk
    ssh_port: 22
    become: true
    become_method: sudo
    os: macos
    gpu_provider: apple
    chip: m4
    ram_gb: 16
    storage_gb: 512
    maintenance: false
    metric_labels: {}
    fleet_token: ~
    ios_build_agent: false
    jenkins_secret: ~

  - id: hydra-gw-01
    hostname: hydra-gw-01
    ip: 192.168.10.10
    <<: *m4_defaults
    pools: [gateway]
    models_dir: ~
    llm_endpoints: []
    role_note: "LiteLLM GW 1 :4000 · HAProxy active · dnsmasq (hydra.local)"

  - id: hydra-gw-02
    hostname: hydra-gw-02
    ip: 192.168.10.11
    <<: *m4_defaults
    pools: [gateway]
    models_dir: ~
    llm_endpoints: []
    role_note: "LiteLLM GW 2 :4000 · HAProxy passive"

  - id: hydra-store-01
    hostname: hydra-store-01
    ip: 192.168.10.12
    <<: *m4_defaults
    pools: [infra]
    models_dir: ~
    llm_endpoints: []
    role_note: "MinIO :9000 · Model Registry API :8100 · sha256 artifact catalog"

  - id: hydra-svc-01
    hostname: hydra-svc-01
    ip: 192.168.10.13
    <<: *m4_defaults
    pools: [infra]
    models_dir: ~
    llm_endpoints: []
    role_note: "Fleet API :8000 · PostgreSQL :5432 · Redis :6379 · VictoriaMetrics :8428 · Grafana :3000 · Alertmanager · NTP · Salt Master"

  # ── FastPool: 10 × M4 — 8B Q4_K_M · tag=fast ─────────────────────────────
