# ansible/cluster.yml
cluster:
  name: hydra-prod
  environment: production
  otel_gateway:
    primary: "192.168.1.10:4317"
    secondary: ""
  prometheus_url: "http://192.168.1.10:9090"
  models_dir: "~/models"
  versions:
    otel_agent: "0.96.0"
    dcgm_exporter: "3.3.6"
    apple_silicon_exporter: "1.0.0"
    node_exporter: "1.8.2"
    amdgpu_exporter: "1.0.0"

# ── OTEL monitoring fan-out destinations ─────────────────────────────────────
# Used by ansible/mac-monitoring.yml (otel-mac-agent role)
# Binaries must be pre-downloaded: see ansible/roles/otel-mac-agent/files/README.md
monitoring:
  collection_interval: "30s"
  victoria_metrics_url: "http://192.168.1.10:8428"    # prometheusremotewrite → Victoria Metrics
  otel_gateway_endpoint: "192.168.1.10:4317"           # otlp/grpc → kube-prometheus-stack
  fleet_platform_otlp: ""                              # optional otlp/http → Fleet Platform (empty = disabled)
  # salt.minion_id = node_id — join key for Fleet Platform data in Grafana

# ── Jenkins iOS build agent configuration ────────────────────────────────────
jenkins:
  host: "http://192.168.1.1:30881"     # Jenkins controller URL (k8s NodePort or direct)
  agent_name: "mobileapp-m3"           # node name as created in Jenkins UI
  user: dk                             # local macOS user owning the agent process
  executors: 2                         # executors configured in Jenkins UI
  pulse_repo_dir: "/Users/dk/pulse"    # path to cloned pulse/jenkins-k8s repo on agent

# ── SaltStack + Fleet Platform configuration ──────────────────────────────────
salt:
  master:
    id: fleet-control                        # ansible inventory hostname for the control plane
    hostname: fleet-control
    ip: 192.168.1.1                          # LAN IP of the Salt Master / Fleet Platform server
    user: dk
    ssh_port: 22
    become: true
    become_method: sudo
    os: linux                                # linux | macos
    kri_app_dir: "/home/dk/Documents/git/kri"
    kri_venv_dir: "/home/dk/Documents/git/kri/.venv"
    kri_user: dk
  config:
    fleet_api_url: "http://192.168.1.1:8000"
    fleet_admin_email: "admin@fleet.local"
    fleet_admin_password: "changeme123"      # plain text v1 — move to vault in v2
    auto_accept_keys: true
    sbom_schedule_time: "02:00am"
    sbom_scan_timeout: 600
    log_level: info

nodes:
  - id: p1-m2-8g
    hostname: mac-m2-8g
    ip: 192.168.1.21
    user: dk
    ssh_port: 22
    become: true
    become_method: sudo
    os: macos
    gpu_provider: apple
    chip: m2
    ram_gb: 8
    models_dir: "/Users/dk/models"
    pools: [embed]
    maintenance: false
    metric_labels: {}
    fleet_token: ~           # set after: POST /api/v1/nodes/register → copy token here
    llm_endpoints:
      - provider: llamacpp
        url: "http://127.0.0.1:21434/v1"
        api_key: ~

  - id: p1-m3-16g
    hostname: mac-m3-16g
    ip: 192.168.1.24
    user: dk
    ssh_port: 22
    become: true
    become_method: sudo
    os: macos
    gpu_provider: apple
    chip: m3
    ram_gb: 16
    models_dir: "/Users/dk/models"
    pools: [fast, reason]
    maintenance: false
    metric_labels: {}
    fleet_token: ~           # set after: POST /api/v1/nodes/register → copy token here
    ios_build_agent: false   # set true + jenkins_secret to enable jenkins-ios-setup.yml
    jenkins_secret: ~        # paste from Jenkins → Manage → Nodes → <node> → Status
    llm_endpoints:
      - provider: llamacpp
        url: "http://127.0.0.1:21434/v1"
        api_key: ~
      - provider: ollama
        url: "http://127.0.0.1:11434/v1"
        api_key: ~

  - id: p1-i7-rtx3050
    hostname: linux-i7-rtx
    ip: 192.168.1.30
    user: dk
    ssh_port: 22
    become: true
    become_method: sudo
    os: linux
    gpu_provider: nvidia
    gpu_model: "RTX 3050"
    gpu_index: 0
    vram_gb: 4
    ram_gb: 64
    cpu_inference: true
    models_dir: "/home/dk/models"
    pools: [fast]
    maintenance: false
    metric_labels: {}
    fleet_token: ~           # set after: POST /api/v1/nodes/register → copy token here
    ios_build_agent: false   # Linux node — iOS builds require macOS; keep false
    jenkins_secret: ~
    llm_endpoints:
      - provider: ollama
        url: "http://127.0.0.1:11434/v1"
        api_key: ~
      - provider: llamacpp
        url: "http://127.0.0.1:21434/v1"
        api_key: ~
