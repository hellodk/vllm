# ── Phase 1 pilot nodes (benchmark baseline — kept for testing) ───────────────
nodes:
  - id: p1-m2-8g
    hostname: mac-m2-8g
    ip: 192.168.1.21
    user: dk
    ssh_port: 22
    become: true
    become_method: sudo
    os: macos
    gpu_provider: apple
    chip: m2
    ram_gb: 8
    models_dir: "/Users/dk/models"
    pools: [embed]
    maintenance: false
    metric_labels: {}
    fleet_token: ~           # set after: POST /api/v1/nodes/register → copy token here
    llm_endpoints:
      - provider: llamacpp
        url: "http://127.0.0.1:21434/v1"
        api_key: ~

  - id: p1-m3-16g
    hostname: mac-m3-16g
    ip: 192.168.1.24
    user: dk
    ssh_port: 22
    become: true
    become_method: sudo
    os: macos
    gpu_provider: apple
    chip: m3
    ram_gb: 16
    models_dir: "/Users/dk/models"
    pools: [fast, reason]
    maintenance: false
    metric_labels: {}
    fleet_token: ~           # set after: POST /api/v1/nodes/register → copy token here
    ios_build_agent: false   # set true + jenkins_secret to enable jenkins-ios-setup.yml
    jenkins_secret: ~        # paste from Jenkins → Manage → Nodes → <node> → Status
    llm_endpoints:
      - provider: llamacpp
        url: "http://127.0.0.1:21434/v1"
        api_key: ~
      - provider: ollama
        url: "http://127.0.0.1:11434/v1"
        api_key: ~

  - id: p1-i7-rtx3050
    hostname: linux-i7-rtx
    ip: 192.168.1.30
    user: dk
    ssh_port: 22
    become: true
    become_method: sudo
    os: linux
    gpu_provider: nvidia
    gpu_model: "RTX 3050"
    gpu_index: 0
    vram_gb: 4
    ram_gb: 64
    cpu_inference: true
    models_dir: "/home/dk/models"
    pools: [fast]
    maintenance: false
    metric_labels: {}
    fleet_token: ~           # set after: POST /api/v1/nodes/register → copy token here
    ios_build_agent: false   # Linux node — iOS builds require macOS; keep false
    jenkins_secret: ~
    llm_endpoints:
      - provider: ollama
        url: "http://127.0.0.1:11434/v1"
        api_key: ~
      - provider: llamacpp
        url: "http://127.0.0.1:21434/v1"
        api_key: ~
