---
# ============================================================
# Continue.dev Role — Generate IDE config for developers
# This runs on your control machine (localhost), not the nodes
# ============================================================

- name: Create continue-dev output directory
  file:
    path: "{{ playbook_dir }}/../../continue-dev/generated"
    state: directory
    mode: "0755"
  delegate_to: localhost
  run_once: true

- name: Generate Continue.dev config
  template:
    src: config.yaml.j2
    dest: "{{ playbook_dir }}/../../continue-dev/generated/config.yaml"
    mode: "0644"
  delegate_to: localhost
  run_once: true

- name: Display developer setup instructions
  debug:
    msg:
      - "Continue.dev config generated at: continue-dev/generated/config.yaml"
      - ""
      - "Developer setup:"
      - "  1. Install Continue.dev extension in VS Code"
      - "  2. Copy config.yaml to ~/.continue/config.yaml"
      - "  3. Open VS Code → Cmd+L for chat, Tab for autocomplete"
      - ""
      - "  API Endpoint: http://{{ gateway_ip }}:{{ litellm_port }}"
      - "  API Key:      {{ litellm_api_key }}"
  run_once: true
