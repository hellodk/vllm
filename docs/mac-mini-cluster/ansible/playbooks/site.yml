---
# ============================================================
# Hydra Pilot — Full Cluster Deployment
#
# Usage:
#   cd ansible
#   make install        # Install Ansible Galaxy deps
#   make deploy         # Deploy everything
#
# Or step by step:
#   ansible-playbook playbooks/site.yml --tags common
#   ansible-playbook playbooks/site.yml --tags inference
#   ansible-playbook playbooks/site.yml --tags gateway
# ============================================================

- name: "Phase 1: Base setup on all nodes"
  hosts: all
  gather_facts: yes
  tags: [common, base]
  roles:
    - common

- name: "Phase 2: Docker (Colima) on gateway node"
  hosts: gateway
  gather_facts: no
  tags: [docker]
  roles:
    - docker

- name: "Phase 3: vLLM-MLX on inference nodes"
  hosts: inference
  gather_facts: no
  tags: [inference, vllm]
  roles:
    - vllm_mlx

- name: "Phase 4: Redis on gateway"
  hosts: gateway
  gather_facts: no
  tags: [redis, gateway]
  roles:
    - redis

- name: "Phase 5: Monitoring stack on gateway"
  hosts: gateway
  gather_facts: no
  tags: [monitoring]
  roles:
    - monitoring

- name: "Phase 6: LiteLLM gateway"
  hosts: gateway
  gather_facts: no
  tags: [gateway, litellm]
  roles:
    - gateway

- name: "Phase 7: End-to-end validation"
  hosts: gateway
  gather_facts: no
  tags: [validate]
  tasks:
    - name: Test inference through LiteLLM → vLLM-MLX
      uri:
        url: "http://localhost:{{ litellm_port }}/v1/chat/completions"
        method: POST
        headers:
          Authorization: "Bearer {{ litellm_api_key }}"
          Content-Type: "application/json"
        body_format: json
        body:
          model: "hydra-coder"
          messages:
            - role: "user"
              content: "Write a Python hello world in one line"
          max_tokens: 50
          temperature: 0.1
        status_code: 200
        timeout: 60
      register: inference_test

    - name: Display test result
      debug:
        msg:
          - "Response: {{ inference_test.json.choices[0].message.content | truncate(200) }}"
          - "Tokens: {{ inference_test.json.usage }}"

    - name: Print deployment summary
      debug:
        msg:
          - "============================================"
          - "  Hydra Pilot — Deployment Complete"
          - "============================================"
          - ""
          - "  API:        http://{{ gateway_ip }}:{{ litellm_port }}"
          - "  API Key:    {{ litellm_api_key }}"
          - "  Grafana:    http://{{ gateway_ip }}:{{ grafana_port }}"
          - "  Prometheus: http://{{ gateway_ip }}:{{ prometheus_port }}"
          - ""
          - "  Runtime:  vLLM-MLX (continuous batching + paged KV)"
          - "  Model:    Qwen 2.5 Coder 7B (MLX 4-bit)"
          - "  Capacity: 24 concurrent requests at 4K context"
          - ""
          - "  Models available via LiteLLM:"
          - "    hydra-coder       → code chat, review, tests"
          - "    hydra-autocomplete → tab completion"
          - ""
          - "  Next: make health-check"
          - "============================================"
