# ============================================================
# Hydra Pilot — Global Variables
# ============================================================

# --- Network ---
gateway_ip: "{{ hostvars['hydra-gw']['ansible_host'] }}"

# --- vLLM-MLX (inference runtime — replaces Ollama) ---
vllm_port: 8000
vllm_model: "Qwen/Qwen2.5-Coder-7B-Instruct"
vllm_quantization: "mlx-4bit"
vllm_max_model_len: 8192
vllm_max_num_seqs: 24
vllm_gpu_memory_utilization: 0.90

# --- LiteLLM Gateway ---
litellm_port: 4000
litellm_api_key: "sk-hydra-pilot-CHANGE-ME"     # ← CHANGE THIS

# --- Redis (rate limiting + token budgets) ---
redis_port: 6379

# --- Monitoring ---
prometheus_port: 9090
grafana_port: 3000
grafana_admin_user: "admin"
grafana_admin_password: "admin"                   # ← CHANGE THIS
loki_port: 3100
promtail_port: 9080
node_exporter_port: 9100

# --- Governance (per Hydra §9.3) ---
governance:
  pilot_user:
    tokens_per_day: 200000
    requests_per_minute: 30
    max_concurrent_requests: 5
    max_context_tokens: 8192
    max_generation_tokens: 4096
  admin:
    tokens_per_day: 0           # 0 = unlimited
    requests_per_minute: 60
    max_concurrent_requests: 10
    max_context_tokens: 8192
    max_generation_tokens: 4096

# --- Guardrails ---
guardrails_temperature_cap: 0.3
guardrails_autocomplete_temperature: 0.05

# --- Directories ---
hydra_base_dir: "/opt/hydra"
hydra_config_dir: "/opt/hydra/config"
hydra_log_dir: "/opt/hydra/logs"
hydra_docker_dir: "/opt/hydra/docker"
