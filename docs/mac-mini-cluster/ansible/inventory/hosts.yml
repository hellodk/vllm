# ============================================================
# Hydra Pilot — 2-Node Cluster Inventory
#
# EDIT ansible_host values to match your actual IPs.
# SSH keys must be deployed: ssh-copy-id admin@<ip>
# ============================================================

all:
  vars:
    ansible_connection: ssh
    ansible_python_interpreter: /opt/homebrew/bin/python3

  children:
    # --- Gateway: LiteLLM + monitoring + Redis (no inference) ---
    gateway:
      hosts:
        hydra-gw:
          ansible_host: 192.168.1.10      # ← CHANGE THIS
          node_chip: m1
          node_ram_gb: 8
          node_cpu_cores: 8
          node_gpu_cores: 8
          colima_cpu: 4
          colima_memory: 2
          colima_disk: 20

    # --- Inference: vLLM-MLX serving ---
    inference:
      hosts:
        hydra-inf-1:
          ansible_host: 192.168.1.11      # ← CHANGE THIS
          node_chip: m3
          node_ram_gb: 16
          node_cpu_cores: 10
          node_gpu_cores: 10

    # -------------------------------------------------------
    # PHASE 2: Scale to 20 nodes — add hosts here:
    #
    # inference:
    #   hosts:
    #     hydra-inf-1:
    #       ansible_host: 192.168.1.11
    #       ...
    #     hydra-inf-2:
    #       ansible_host: 192.168.1.12
    #       node_chip: m4
    #       node_ram_gb: 16
    #       ...
    # -------------------------------------------------------
